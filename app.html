  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#080E1C;--s1:#0D1628;--s2:#142038;--s3:#1C2D4A;
      --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);
      --ind:#2B8AE0;--indl:#82C2FF;--indll:#B6D9FF;--vio:#1A72CC;--glow:rgba(43,138,224,0.28);
      --rose:#f43f5e;--rosel:#fb7185;
      --cyan:#06b6d4;--cyanl:#22d3ee;
      --amb:#f59e0b;--ambl:#fbbf24;
      --em:#10b981;--eml:#34d399;
      --txt:#EEF4FF;--txt2:#8BA5C8;--mu:#4A6080;
      /* ── Layout tokens: single source of truth for all spacing ── */
      --safe-t:env(safe-area-inset-top,0px);
      --safe-b:env(safe-area-inset-bottom,0px);
      /* Legacy aliases used throughout the app */
      --st:env(safe-area-inset-top,0px);
      --sb:env(safe-area-inset-bottom,0px);
      /* Nav: content height + safe area bottom */
      --nav-content-h:49px;
      --nav-h:calc(var(--nav-content-h) + 6px + max(0px, env(safe-area-inset-bottom,0px) - 35px));
    }
    html.native {
      --nav-h:calc(var(--nav-content-h) + 6px + max(env(safe-area-inset-bottom,34px),34px));
      /* FAB: sits above nav with 8px breathing room */
      --fab-h:52px;
      --fab-gap:8px;
      --fab-bottom:calc(var(--nav-h) + var(--fab-gap));
      /* Page: 160px ensures + LOG FOOD button scrolls clear of nav + FAB */
      --page-pb:165px;
      /* Fullscreen overlays: header padding respects Dynamic Island */
      --overlay-header-pt:calc(env(safe-area-inset-top,44px) + 10px);
      /* Chat input: respects home indicator */
      --chat-input-pb:max(20px, env(safe-area-inset-bottom,20px));
      --app-max-w:430px
    }
    @media(min-width:600px){:root{--app-max-w:680px}}
    html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--txt)}
    body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
    #root{height:100%}
    .app{max-width:var(--app-max-w);margin:0 auto;height:100dvh;height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative}

    /* Header */
    .hdr{flex-shrink:0;padding:calc(var(--st) + 14px) 20px 0;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px}
    .logo em{color:var(--indl);font-style:normal}
    .hdr-r{text-align:right}
    .hdr-date{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace}

    /* Toast */
    .toast{position:fixed;top:calc(var(--st) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);z-index:999;background:var(--em);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;box-shadow:0 4px 20px rgba(16,185,129,0.4);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.35s;opacity:0;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:10px}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast.show.action{pointer-events:auto}
    .toast-undo{background:rgba(255,255,255,0.25);border:none;color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;letter-spacing:0.5px;white-space:nowrap}

    /* Page */
    .page{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px 0;padding-bottom:180px !important;-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}

    /* Week selector */
    .week-nav{display:flex;align-items:center;gap:4px;margin-bottom:14px}
    .week-arrow{background:none;border:1px solid var(--b1);border-radius:10px;color:var(--mu);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:border-color 0.15s,color 0.15s}
    .week-arrow:active{border-color:var(--ind);color:var(--indl)}
    .week-days{display:flex;gap:3px;flex:1;overflow:visible;min-width:0}
    .day-pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:none;font-family:'DM Sans',sans-serif;min-width:0}
    .day-pill-letter{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--mu)}
    .day-pill-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--mu)}
    .day-pill.today .day-pill-letter,.day-pill.today .day-pill-num{color:var(--txt2)}
    .day-pill.today{border-color:var(--b1);background:var(--s1)}
    .day-pill.selected{background:var(--ind);border-color:var(--ind)}
    .day-pill.selected .day-pill-letter,.day-pill.selected .day-pill-num{color:#fff}
    .day-pill.has-data .day-pill-num::after{content:'·';display:block;width:4px;height:4px;border-radius:50%;background:var(--indll);margin:1px auto 0;font-size:0;line-height:0}
    .week-label{font-size:10px;color:var(--mu);text-align:center;margin-bottom:10px;font-family:'JetBrains Mono',monospace}

    /* Cal hero */
    .cal-hero{background:linear-gradient(145deg,#0f0f22 0%,#131328 60%,#0f1020 100%);border:1px solid var(--b2);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .cal-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(99,102,241,0.13) 0%,transparent 65%);pointer-events:none}
    .cal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .cal-lhs .cal-lbl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;font-weight:600}
    .cal-num{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:0.9;color:var(--indl)}
    .cal-unit{font-size:12px;color:var(--mu);margin-top:6px}
    .cal-rhs{text-align:right;padding-top:4px}
    .cal-rem-lbl{font-size:11px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
    .cal-rem-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600}
    .cal-rem-val.good{color:var(--indl)} .cal-rem-val.over{color:var(--rose)}
    .cal-rem-sub{font-size:11px;margin-top:3px} .cal-rem-sub.good{color:var(--em)} .cal-rem-sub.over{color:var(--rosel)}
    .pbar-track{height:7px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin-bottom:18px}
    .pbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ind),var(--vio),var(--indl));background-size:200%;animation:shim 3s linear infinite;transition:width 0.7s cubic-bezier(0.4,0,0.2,1)}
    .pbar-fill.over{background:linear-gradient(90deg,var(--rose),var(--rosel));animation:none}
    @keyframes shim{0%{background-position:100% 0}100%{background-position:-100% 0}}
    .macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .mpill{background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:14px;padding:11px 8px 9px;text-align:center;position:relative;overflow:hidden}
    .mpill::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
    .mpill.p::before{background:var(--rose)} .mpill.c::before{background:var(--cyan)} .mpill.f::before{background:var(--amb)}
    .mpill-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;margin-bottom:2px}
    .mpill.p .mpill-val{color:var(--rosel)} .mpill.c .mpill-val{color:var(--cyanl)} .mpill.f .mpill-val{color:var(--ambl)}
    .mpill-name{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
    .mpill-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin:0 4px}
    .mpill-bar-fill{height:100%;border-radius:2px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1)}
    .mpill.p .mpill-bar-fill{background:var(--rose)} .mpill.c .mpill-bar-fill{background:var(--cyan)} .mpill.f .mpill-bar-fill{background:var(--amb)}
    .mpill-goal{font-size:9px;color:var(--mu);margin-top:4px;font-family:'JetBrains Mono',monospace}

    /* Meals */
    .meal-block{margin-bottom:8px}
    .meal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:14px;cursor:pointer;user-select:none;transition:background 0.15s}
    .meal-hd:active{background:var(--s2)}
    .meal-hd.open{border-radius:14px 14px 0 0;border-bottom-color:transparent}
    .meal-hd-l{display:flex;align-items:center;gap:9px}
    .meal-emoji{font-size:17px}
    .meal-hd-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--txt2)}
    .meal-hd-r{display:flex;align-items:center;gap:9px}
    .meal-kcal{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mu)}
    .meal-add{width:28px;height:28px;border-radius:9px;background:var(--ind);border:none;color:#fff;font-size:20px;font-weight:300;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s,background 0.15s}
    .meal-add:active{transform:scale(0.9);background:var(--vio)}
    .meal-items{background:var(--s1);border:1px solid var(--b1);border-top:none;border-radius:0 0 14px 14px;overflow:hidden}
    .meal-empty{padding:12px 14px;font-size:12px;color:var(--mu);font-style:italic}
    .food-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1);animation:slin 0.22s ease}
    @keyframes slin{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
    .food-row:last-child{border-bottom:none}
    .food-info{flex:1;min-width:0}
    .food-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .food-srv{font-size:11px;color:var(--mu);margin-top:1px}
    .food-right{text-align:right;flex-shrink:0;margin-left:10px}
    .food-cal{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
    .food-mpw{font-size:10px;color:var(--mu);margin-top:2px;font-family:'JetBrains Mono',monospace}
    .food-del{background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer;padding:0 0 0 10px;line-height:1;flex-shrink:0;transition:color 0.15s}
    .food-del:active{color:var(--rose)}
    .food-row{cursor:pointer}
    .food-row:active{background:var(--s2)}
    /* Edit entry sheet */
    .edit-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fdin 0.2s ease}
    .edit-sheet{position:fixed;bottom:0;left:0;right:0;width:100%;max-width:var(--app-max-w);margin:0 auto;background:var(--s1);border:1px solid var(--b2);border-radius:24px 24px 0 0;padding:20px 20px calc(var(--sb) + 24px);z-index:401;animation:sup 0.3s cubic-bezier(0.4,0,0.2,1)}
    .edit-sheet-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 18px}
    .edit-sheet-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .edit-sheet-sub{font-size:11px;color:var(--mu);margin-bottom:18px}
    .edit-macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .edit-macro-field{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:12px 14px;transition:border-color 0.15s}
    .edit-macro-field:focus-within{border-color:rgba(99,102,241,0.6)}
    .edit-macro-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--mu);margin-bottom:4px}
    .edit-macro-label.p{color:var(--rose)} .edit-macro-label.c{color:var(--cyan)} .edit-macro-label.f{color:var(--amb)} .edit-macro-label.cal{color:var(--indl)}
    .edit-macro-input{width:100%;background:none;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--txt);padding:0}
    .edit-macro-unit{font-size:10px;color:var(--mu);margin-top:2px}
    .edit-cal-row{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s}
    .edit-cal-row:focus-within{border-color:rgba(99,102,241,0.6)}
    .edit-cal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--indl)}
    .edit-cal-input{background:none;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--txt);width:120px;text-align:right}
    .edit-cal-unit{font-size:11px;color:var(--mu)}
    .edit-save-btn{width:100%;background:linear-gradient(135deg,var(--ind),var(--vio));border:none;border-radius:14px;padding:15px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:transform 0.15s}
    .edit-save-btn:active{transform:scale(0.98)}

    /* FAB */
    .fab{position:fixed;bottom:var(--fab-bottom);left:16px;right:16px;max-width:calc(var(--app-max-w) - 32px);margin:0 auto;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:18px;padding:15px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px var(--glow);z-index:40;transition:transform 0.15s}
    .fab:active{transform:scale(0.97)}

    /* Nav — native iOS tab bar: no height calc, padding defines the zones */
    .nav{position:fixed;bottom:0;left:0;right:0;margin:0;display:flex;align-items:flex-start;justify-content:space-around;background:var(--bg);border-top:0.5px solid rgba(255,255,255,0.1);z-index:50;padding-top:6px;padding-bottom:max(0px,calc(env(safe-area-inset-bottom,0px) - 35px))}
    html.native .nav{padding-bottom:env(safe-area-inset-bottom,34px)!important}

    .nav-btn{flex:1;height:var(--nav-content-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;padding:0;margin:0;position:relative;-webkit-tap-highlight-color:transparent}
    .nav-icon{font-size:30px;display:block;line-height:1;margin:0;padding:0;position:relative;z-index:1}
    .nav-lbl{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--mu);font-family:'DM Sans',sans-serif;transition:color 0.2s;line-height:1;margin:0;padding:0;display:none;position:relative;z-index:1}
    .nav-dot{display:none}
    .nav-btn::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:36px;border-radius:18px;background:transparent;transition:background 0.2s;pointer-events:none;z-index:0}
    .nav-btn.active::before{background:rgba(99,102,241,0.15)}
    .nav-btn.active .nav-lbl{color:var(--indl);display:block}

    /* Modal */
    .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);animation:fdin 0.2s ease}
    @keyframes fdin{from{opacity:0}to{opacity:1}}
    .sheet{background:var(--s1);border:1px solid var(--b2);border-radius:26px 26px 0 0;width:100%;max-width:var(--app-max-w);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:calc(var(--sb) + 30px);-webkit-overflow-scrolling:touch;animation:sup 0.3s cubic-bezier(0.4,0,0.2,1)}
    .sheet-fixed{flex-shrink:0;padding:20px 18px 0}
    .sheet-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 18px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .sheet-scroll::-webkit-scrollbar{display:none}
    @keyframes sup{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
    .sheet-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 20px}
    .sheet-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:18px}
    .tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex:0 0 auto;padding:9px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:11px;color:var(--mu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap}
    .tab-btn.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
    .chip{padding:7px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:22px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:5px}
    .chip.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .fg{margin-bottom:12px}
    .fl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
    .field{width:100%;padding:12px 13px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none}
    .field:focus{border-color:var(--ind);background:rgba(99,102,241,0.06)}
    .field.fp:focus{border-color:var(--rose)} .field.fc:focus{border-color:var(--cyan)} .field.ff:focus{border-color:var(--amb)}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;cursor:pointer;margin-top:8px;box-shadow:0 4px 20px var(--glow);transition:transform 0.15s}
    .btn:active{transform:scale(0.98)} .btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
    .btn-ghost{width:100%;padding:14px;background:transparent;color:var(--mu);border:1px solid var(--b1);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:8px}
    .btn-sm{padding:0 14px;height:46px;flex-shrink:0;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer}
    .btn-danger{width:100%;padding:14px;background:rgba(244,63,94,0.1);color:var(--rose);border:1px solid rgba(244,63,94,0.3);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:6px;transition:background 0.15s}
    .btn-danger:active{background:rgba(244,63,94,0.2)}

    /* Search */
    .search-wrap{position:relative;margin-bottom:10px}
    .search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
    .search-field{width:100%;padding:12px 14px 12px 40px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
    .search-field:focus{border-color:var(--ind)}
    .sres{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--b1);border-radius:11px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s,background 0.15s}
    .sres:active{border-color:var(--ind);background:rgba(99,102,241,0.06)}
    .sr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
    .sr-sub{font-size:10px;color:var(--mu);margin-top:2px;font-family:'JetBrains Mono',monospace}
    .sr-cal{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--indll);flex-shrink:0;margin-left:8px}
    .detail-box{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.3);border-radius:16px;padding:16px;margin-top:8px}
    .det-name{font-size:15px;font-weight:600;margin-bottom:3px}
    .det-sub{font-size:11px;color:var(--mu);margin-bottom:14px}
    .m4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
    .m4c{text-align:center;background:rgba(255,255,255,0.04);border-radius:10px;padding:9px 3px;border:1px solid var(--b1)}
    .m4v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}
    .m4l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
    .ai-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;letter-spacing:0.5px;margin-bottom:10px}
    .scan-drop{border:2px dashed var(--b2);border-radius:18px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color 0.2s}
    .scan-drop:active{border-color:var(--ind)}
    .scan-prev{width:100%;border-radius:14px;margin-bottom:10px;max-height:220px;object-fit:cover}
    .scanner-wrap{position:relative;border-radius:18px;overflow:hidden;background:#000;aspect-ratio:1;margin-bottom:12px}
    .scanner-video{width:100%;height:100%;object-fit:cover;display:block}
    .scanner-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .scanner-box{width:60%;aspect-ratio:1;border:2px solid var(--indl);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);position:relative}
    .sc{position:absolute;width:20px;height:20px;border-color:var(--indl);border-style:solid}
    .sc.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:5px 0 0 0}
    .sc.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 5px 0 0}
    .sc.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 5px}
    .sc.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 5px 0}
    .scan-line{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,var(--indl),transparent);animation:sl 2s ease-in-out infinite;top:50%}
    @keyframes sl{0%,100%{transform:translateY(-30px);opacity:0.5}50%{transform:translateY(30px);opacity:1}}
    .scanner-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.6)}
    .loading-row{display:flex;align-items:center;gap:10px;color:var(--mu);font-size:13px;padding:12px 0}
    .spin{width:18px;height:18px;flex-shrink:0;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--ind);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err{color:var(--rose);font-size:12px;padding:5px 0}
    .ok-text{color:var(--em);font-size:12px;margin-top:8px;display:flex;align-items:center;gap:5px}

    /* Weight */
    .w-hero{background:linear-gradient(145deg,#0f0f22,#131328);border:1px solid var(--b2);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .w-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 65%);pointer-events:none}
    .w-lbl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:600}
    .w-big{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1}
    .w-big span{font-size:18px;color:var(--mu);font-family:'DM Sans',sans-serif;font-weight:300}
    .w-delta{font-size:13px;font-family:'JetBrains Mono',monospace;margin-top:5px}
    .w-delta.dn{color:var(--em)} .w-delta.up{color:var(--rose)}
    .chart-area{height:120px;margin:14px 0 4px}
    .wlog-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b1)}
    .wlog-row:last-child{border-bottom:none}
    .wlog-date{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace}
    .wlog-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}

    /* Adapt */
    .adapt{background:linear-gradient(145deg,#0d0d24,#111128);border:1px solid rgba(99,102,241,0.25);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
    .adapt::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(139,92,246,0.1) 0%,transparent 65%);pointer-events:none}
    .adapt.ontrack{border-color:rgba(16,185,129,0.3);background:linear-gradient(145deg,#0a1a14,#0d1e18)}
    .adapt-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .adapt-title{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--indll);letter-spacing:1px}
    .adapt.ontrack .adapt-title{color:var(--eml)}
    .adapt-body{font-size:13px;color:var(--txt2);line-height:1.65}
    .adapt-stats{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid rgba(99,102,241,0.15)}
    .ast{text-align:center}
    .ast-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px}
    .ast-val{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--indll);margin-top:4px}
    .unlock-dots{display:flex;gap:6px;margin-top:12px}
    .udot{height:5px;border-radius:3px;flex:1;background:rgba(255,255,255,0.07)}
    .udot.on{background:var(--ind)}
    /* TDEE estimate banner */
    .tdee-banner{background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(251,191,36,0.06));border:1px solid rgba(245,158,11,0.25);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
    .tdee-banner-val{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--ambl);letter-spacing:1px;line-height:1}
    .tdee-banner-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px}
    .tdee-banner-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600}
    .tdee-banner-badge.high{background:rgba(16,185,129,0.15);color:var(--eml)}
    .tdee-banner-badge.medium{background:rgba(245,158,11,0.15);color:var(--ambl)}
    /* Trend weight pill in hero */
    .w-trend{font-size:12px;color:var(--ambl);margin-top:4px;font-weight:600}

    /* Settings */
    .scard{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:20px;margin-bottom:12px}
    .stitle{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;font-weight:700}
    .srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1)}
    .srow:last-child{border-bottom:none}
    .slbl{font-size:14px}
    .sval{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--indll)}
    .prog-row{margin-bottom:12px}
    .prog-head{display:flex;justify-content:space-between;margin-bottom:5px}
    .prog-lbl{font-size:13px}
    .prog-val{font-size:11px;font-family:'JetBrains Mono',monospace}
    .muted-t{color:var(--mu);font-size:13px;line-height:1.65}

    /* Coach tab */
    .coach-hero{background:linear-gradient(145deg,#0d0d24 0%,#111130 60%,#0a0a20 100%);border:1px solid rgba(99,102,241,0.3);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .coach-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(139,92,246,0.15) 0%,transparent 65%);pointer-events:none}
    .coach-hero::after{content:'';position:absolute;bottom:-40px;left:-20px;width:160px;height:160px;background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 65%);pointer-events:none}
    .coach-hero-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative}
    .coach-hero-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--indll)}
    .coach-hero-sub{font-size:11px;color:var(--mu);margin-top:2px}
    .coach-regen{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:10px;color:var(--indll);font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .coach-regen:active{background:rgba(99,102,241,0.3)}
    .coach-regen:disabled{opacity:0.4;cursor:not-allowed}
    .report-loading{display:flex;align-items:center;gap:10px;color:var(--mu);font-size:13px;padding:8px 0}
    .report-body{font-size:14px;color:var(--txt2);line-height:1.75;position:relative}
    .report-body strong{color:var(--txt);font-weight:600}
    .report-body .bullet{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
    .report-body .bullet-dot{width:6px;height:6px;border-radius:50%;background:var(--indl);flex-shrink:0;margin-top:6px}
    .report-no-data{text-align:center;padding:16px 0}
    .report-no-data-icon{font-size:40px;margin-bottom:10px}
    .quick-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .quick-btn{padding:8px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:22px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .quick-btn:active{background:rgba(99,102,241,0.15);border-color:var(--ind);color:var(--indll)}
    /* ── Chat compact preview ── */
    .chat-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:20px;overflow:hidden;margin-bottom:14px}
    .chat-preview{padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background 0.15s}
    .chat-preview:active{background:var(--s2)}
    .chat-preview-left{display:flex;align-items:center;gap:12px}
    .chat-preview-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--vio));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .chat-preview-text{font-size:13px;color:var(--txt2);line-height:1.5}
    .chat-preview-title{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:2px}
    .chat-preview-arrow{color:var(--mu);font-size:18px;flex-shrink:0}

    /* ── Chat fullscreen overlay ── */
    .chat-fullscreen{
      position:fixed;
      inset:0;
      width:100%;max-width:var(--app-max-w);
      left:50%;transform:translateX(-50%);
      height:100vh;height:100dvh;
      z-index:9999;
      background:var(--bg);
      display:flex;flex-direction:column;
      overflow:hidden;
      animation:slideUp 0.25s ease-out;
    }
    @keyframes slideUp{
      from{transform:translateX(-50%) translateY(100%);opacity:0.8}
      to{transform:translateX(-50%) translateY(0);opacity:1}
    }
    .chat-fs-header{
      display:flex;align-items:center;gap:12px;
      padding-top:var(--overlay-header-pt);
      padding-left:16px;padding-right:16px;padding-bottom:14px;
      border-bottom:1px solid var(--b1);
      background:var(--s1);
      flex-shrink:0;
    }
    html.native .chat-fs-header{padding-top:calc(max(env(safe-area-inset-top,0px),44px) + 10px)}
    html.native .chat-input-row{padding-bottom:max(env(safe-area-inset-bottom,0px),34px)}
    .chat-fs-back{
      width:40px;height:40px;border-radius:50%;
      background:var(--s2);border:1px solid var(--b2);
      color:var(--txt);font-size:24px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-weight:300;
      -webkit-tap-highlight-color:transparent;
      z-index:10;
    }
    .chat-fs-title{font-size:16px;font-weight:600;color:var(--txt);flex:1}
    .chat-fs-sub{font-size:11px;color:var(--mu)}
    .chat-fs-usage{font-size:11px;color:var(--mu);text-align:right;flex-shrink:0}

    /* ── Messages ── */
    .chat-msgs{
      flex:1;
      overflow-y:scroll;
      -webkit-overflow-scrolling:touch;
      padding:16px;
      display:flex;flex-direction:column;gap:12px;
      overscroll-behavior:contain;
      min-height:0;
    }
    .chat-msgs::-webkit-scrollbar{display:none}
    .msg{display:flex;flex-direction:column;gap:3px}
    .msg.user{align-items:flex-end}
    .msg.ai{align-items:flex-start}
    .msg-bubble{padding:11px 15px;border-radius:18px;max-width:88%;font-size:14px;line-height:1.65;word-break:break-word}
    .msg.user .msg-bubble{background:var(--ind);color:#fff;border-radius:18px 18px 4px 18px}
    .msg.ai .msg-bubble{background:var(--s1);color:var(--txt2);border-radius:18px 18px 18px 4px;border:1px solid var(--b1)}
    .msg.ai .msg-bubble strong{color:var(--txt)}
    .msg-time{font-size:10px;color:var(--mu);padding:0 4px}

    /* ── Input row ── */
    .chat-input-row{
      display:flex;align-items:flex-end;gap:8px;
      padding:10px 14px;
      padding-bottom:var(--chat-input-pb);
      background:var(--bg);
      flex-shrink:0;
    }
    .chat-input{
      flex:1;padding:11px 16px;
      background:var(--s2);
      border:1px solid var(--b1);
      border-radius:22px;color:var(--txt);
      font-family:'DM Sans',sans-serif;font-size:15px;
      outline:none;transition:border-color 0.2s;
      resize:none;max-height:120px;line-height:1.5;
    }
    .chat-input:focus{border-color:rgba(99,102,241,0.5)}
    .chat-send{
      width:38px;height:38px;border-radius:50%;
      background:var(--ind);border:none;color:#fff;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:transform 0.15s,opacity 0.15s;
      margin-bottom:1px;
    }
    .chat-send svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .chat-send:active{transform:scale(0.9)}
    .chat-send:disabled{opacity:0.3;cursor:not-allowed;transform:none}

    /* ── Typing indicator ── */
    .typing-bubble{display:flex;align-items:center;gap:4px;padding:11px 15px}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--mu);animation:tdot 1.2s ease-in-out infinite}
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

    .no-worker-coach{background:linear-gradient(145deg,#0d0d24,#111130);border:1px solid rgba(99,102,241,0.25);border-radius:20px;padding:24px;text-align:center;margin-bottom:14px}
    .no-worker-icon{font-size:44px;margin-bottom:12px}
    .no-worker-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--indll);letter-spacing:1px;margin-bottom:8px}
    .no-worker-text{font-size:13px;color:var(--mu);line-height:1.65}

    /* ── Onboarding ── */
    .ob-wrap{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;overflow:hidden;max-width:var(--app-max-w);margin:0 auto}
    .ob-progress{height:3px;background:var(--b1);flex-shrink:0}
    .ob-progress-fill{height:100%;background:linear-gradient(90deg,var(--ind),var(--vio));transition:width 0.4s ease}
    .ob-body{flex:1;overflow-y:auto;padding:32px 24px 24px;-webkit-overflow-scrolling:touch}
    html.native .ob-body{padding-top:32px}
    .ob-step-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;font-weight:700}
    .ob-title{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1.05;letter-spacing:1px;margin-bottom:8px}
    .ob-title em{color:var(--indl);font-style:normal}
    .ob-sub{font-size:14px;color:var(--txt2);line-height:1.65;margin-bottom:28px}
    .ob-footer{flex-shrink:0;padding:16px 24px calc(var(--sb) + 16px);border-top:1px solid var(--b1);background:var(--bg)}
    .ob-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:16px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 24px var(--glow);transition:transform 0.15s}
    .ob-btn:active{transform:scale(0.98)}
    .ob-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
    .ob-back{background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;padding:10px 0 0;display:block;margin:0 auto;font-family:'DM Sans',sans-serif}
    .ob-seg{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .ob-seg-btn{flex:1;min-width:80px;padding:11px 8px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:12px;color:var(--mu);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;text-align:center}
    .ob-seg-btn.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .ob-field{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--b1);border-radius:14px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;margin-bottom:12px}
    .ob-field:focus{border-color:var(--ind)}
    .ob-field-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;margin-top:4px}
    .ob-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ob-result{background:linear-gradient(145deg,#0d0d24,#111130);border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:20px;margin-bottom:16px}
    .ob-result-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--indll);letter-spacing:1px;margin-bottom:14px}
    .ob-result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .ob-result-row:last-child{border-bottom:none}
    .ob-result-lbl{font-size:13px;color:var(--txt2)}
    .ob-result-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--indll)}
    .ob-macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
    .ob-macro{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--b1)}
    .ob-macro-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;margin-bottom:3px}
    .ob-macro-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px}
    .ob-edit-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b1)}
    .ob-edit-row:last-child{border-bottom:none}
    .ob-edit-lbl{font-size:13px;color:var(--txt2)}
    .ob-edit-input{width:90px;padding:8px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--b1);border-radius:10px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;text-align:right;-webkit-appearance:none}
    .ob-edit-input:focus{border-color:var(--ind)}
    /* Rate limit banner */
    .rate-banner{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
    .rate-banner-icon{font-size:22px;flex-shrink:0}
    .rate-banner-text{font-size:13px;color:var(--txt2);line-height:1.55}
    .rate-banner-text strong{color:var(--rosel)}

    /* Light mode */
    .light{
      --bg:#F0F6FF;--s1:#FFFFFF;--s2:#E4EEF9;--s3:#D4E4F2;
      --b1:rgba(10,30,60,0.09);--b2:rgba(10,30,60,0.16);
      --txt:#0B1F3A;--txt2:#3A5A7A;--mu:#4A6A8A;
      --indll:#1558B0;--indl:#1A72CC;
    }
    .light .logo em{color:var(--ind)}
    .light .logo-box{background:var(--bg)!important}
    .light .cal-hero{background:linear-gradient(145deg,#ddeeff 0%,#d2e8ff 60%,#e0f0ff 100%)}
    .light .w-hero{background:linear-gradient(145deg,#ddeeff,#d2e8ff)}
    .light .coach-hero,.light .mp-hero{background:linear-gradient(145deg,#d8eaff,#cce2ff)}
    .light .adapt{background:linear-gradient(145deg,#d8eaff,#cce2ff)}
    .light .no-worker-coach{background:linear-gradient(145deg,#d8eaff,#cce2ff)}
    .light .msg.ai .msg-bubble{background:var(--s3);border-color:var(--b2)}
    .light .ob-wrap{background:var(--bg)}
    .light .ob-result{background:linear-gradient(145deg,#d8eaff,#cce2ff)}
    .light .nav{background:rgba(240,246,255,0.97);border-top-color:rgba(10,30,60,0.1)}


    /* Settings panel — full-screen */
    .settings-panel{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--app-max-w);z-index:300;background:var(--s1);border-left:1px solid var(--b2);border-right:1px solid var(--b2);border-radius:0;height:100%;display:flex;flex-direction:column;overflow:hidden;padding-bottom:calc(var(--sb) + 8px);animation:sup 0.3s cubic-bezier(0.4,0,0.2,1)}
    .settings-panel-overlay{position:fixed;inset:0;z-index:299;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fdin 0.2s ease}
    .sp-handle-row{flex-shrink:0;padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;display:flex;align-items:center;justify-content:space-between}
    .sp-panel-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px}
    .sp-close{background:rgba(255,255,255,0.06);border:none;color:var(--mu);font-size:18px;width:32px;height:32px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .sp-scroll{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}
    .sp-scroll::-webkit-scrollbar{display:none}
    .sp-section{margin-bottom:22px}
    .sp-title{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:12px}
    .theme-row{display:flex;gap:10px;margin-bottom:4px}
    .theme-btn{flex:1;padding:14px 10px;border-radius:14px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;text-align:center;transition:all 0.15s;font-family:'DM Sans',sans-serif}
    .theme-btn.active{border-color:var(--ind);background:rgba(99,102,241,0.1)}
    .theme-btn-icon{font-size:24px;margin-bottom:4px}
    .theme-btn-label{font-size:12px;font-weight:600;color:var(--txt2)}
    .theme-btn.active .theme-btn-label{color:var(--ind)}
    .settings-gear{background:none;border:none;cursor:pointer;padding:4px;color:var(--mu);font-size:20px;transition:color 0.15s;line-height:1}
    .settings-gear:active{color:var(--indl)}

    /* Train tab */
    .train-hero{background:linear-gradient(145deg,#0a1a0a,#0f1f10);border:1px solid rgba(16,185,129,0.25);border-radius:24px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
    .train-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 65%);pointer-events:none}
    .train-hero-empty{text-align:center;padding:8px 0 4px}
    .train-hero-empty-icon{font-size:36px;margin-bottom:8px}
    .train-hero-empty-lbl{font-size:13px;color:var(--mu)}
    .train-stats-row{display:flex;gap:0;margin-top:4px}
    .train-stat{flex:1;text-align:center;padding:4px 0}
    .train-stat:not(:last-child){border-right:1px solid var(--b1)}
    .train-stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--eml)}
    .train-stat-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
    .train-section-hd{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px}
    .train-section-lbl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;font-weight:700}

    /* Exercise cards */
    .ex-card{background:var(--s1);border:1px solid var(--b1);border-radius:18px;margin-bottom:8px;overflow:hidden;transition:border-color 0.15s}
    .ex-card.expanded{border-color:rgba(16,185,129,0.3)}
    .ex-card-hd{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .ex-card-name{font-size:14px;font-weight:600;color:var(--txt);flex:1}
    .ex-badge-row{display:flex;gap:5px;align-items:center;margin-top:3px}
    .muscle-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:2px 7px;border-radius:6px;background:rgba(99,102,241,0.15);color:var(--indll)}
    .pr-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;background:var(--em);color:#fff;letter-spacing:0.3px}
    .ex-card-chevron{font-size:12px;color:var(--mu);transition:transform 0.2s;flex-shrink:0}
    .ex-card.expanded .ex-card-chevron{transform:rotate(180deg)}
    .ex-card-body{padding:0 16px 14px;border-top:1px solid var(--b1)}
    .overload-hint{font-size:12px;color:var(--ambl);background:rgba(245,158,11,0.08);border-radius:8px;padding:7px 10px;margin:10px 0 8px;display:flex;align-items:center;gap:6px}
    .set-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .set-row:last-of-type{border-bottom:none}
    .set-num{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace;width:14px;flex-shrink:0}
    .set-data{flex:1;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--txt2)}
    .set-rpe{font-size:10px;color:var(--mu);margin-left:4px}
    .set-del{background:none;border:none;color:var(--mu);font-size:16px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1}
    .set-del:active{color:var(--rose)}
    .set-add-form{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
    .set-input{background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--txt);font-size:14px;font-family:'JetBrains Mono',monospace;padding:8px 10px;width:80px;text-align:center;outline:none}
    .set-input:focus{border-color:var(--ind)}
    .set-input.rpe{width:54px}
    .set-confirm-btn{background:var(--em);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;padding:8px 14px;cursor:pointer;flex-shrink:0}
    .set-confirm-btn:active{opacity:0.8}
    .set-add-trigger{background:none;border:1px dashed var(--b2);border-radius:10px;color:var(--mu);font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;width:100%;margin-top:8px;transition:all 0.15s}
    .set-add-trigger:active{border-color:var(--em);color:var(--eml)}
    .one-rm-row{font-size:11px;color:var(--mu);margin-top:10px;display:flex;align-items:center;gap:6px}
    .one-rm-val{color:var(--indll);font-family:'JetBrains Mono',monospace;font-weight:600}

    /* Volume card */
    .vol-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:18px;margin-bottom:14px}
    .vol-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;cursor:pointer}
    .vol-card-title{font-size:13px;font-weight:700;color:var(--txt)}
    .vol-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .vol-row:last-child{margin-bottom:0}
    .vol-group{font-size:11px;color:var(--txt2);width:76px;flex-shrink:0}
    .vol-bar-track{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
    .vol-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--em),var(--eml));transition:width 0.4s}
    .vol-bar-fill.over{background:linear-gradient(90deg,var(--amb),var(--ambl))}
    .vol-count{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--mu);width:44px;text-align:right;flex-shrink:0}

    /* Templates */
    .tmpl-section{margin-bottom:14px}
    .tmpl-chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
    .tmpl-chips::-webkit-scrollbar{display:none}
    .tmpl-chip{flex-shrink:0;padding:9px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:12px;color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .tmpl-chip:active{background:rgba(99,102,241,0.15);border-color:var(--ind);color:var(--indll)}
    .tmpl-chip.save{border-style:dashed;color:var(--mu)}

    /* NLP workout input */
    .nlp-workout-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:14px;margin-bottom:14px}
    .nlp-workout-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px}

    /* light mode overrides */
    .light .train-hero{background:linear-gradient(145deg,#e8f5e8,#edf7ed)}

    /* Meal Plan tab */
    .mp-hero{background:linear-gradient(145deg,#0d0d24,#111130);border:1px solid rgba(99,102,241,0.3);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .mp-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(139,92,246,0.12) 0%,transparent 65%);pointer-events:none}
    .mp-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--indll);margin-bottom:4px}
    .mp-sub{font-size:13px;color:var(--mu);margin-bottom:18px;line-height:1.5}
    .day-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .day-btn{width:44px;height:44px;border-radius:12px;border:1px solid var(--b1);background:var(--s2);color:var(--mu);font-size:14px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
    .day-btn.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .mp-generate{width:100%;padding:15px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 20px var(--glow);transition:transform 0.15s}
    .mp-generate:active{transform:scale(0.98)}
    .mp-generate:disabled{opacity:0.4;cursor:not-allowed;transform:none}
    .mp-day-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;margin-bottom:10px;overflow:hidden}
    .mp-day-header{padding:14px 16px;background:rgba(99,102,241,0.08);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
    .mp-day-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--indll)}
    .mp-day-macros{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace}
    .mp-meal-section{padding:14px 16px;border-bottom:1px solid var(--b1)}
    .mp-meal-section:last-child{border-bottom:none}
    .mp-meal-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:10px}
    .mp-food-item{display:flex;align-items:flex-start;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .mp-food-item:last-child{border-bottom:none}
    .mp-food-name{font-size:13px;font-weight:500;color:var(--txt);flex:1;margin-right:10px}
    .mp-food-weight{font-size:11px;color:var(--indll);font-family:'JetBrains Mono',monospace;white-space:nowrap;text-align:right}
    .mp-food-macros{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-top:2px}
    .mp-shopping-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:20px;margin-bottom:14px}
    .mp-shop-category{margin-bottom:14px}
    .mp-shop-category:last-child{margin-bottom:0}
    .mp-shop-cat-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:8px}
    .mp-shop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .mp-shop-item:last-child{border-bottom:none}
    .mp-shop-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--b2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .mp-shop-check.checked{background:var(--em);border-color:var(--em)}
    .mp-shop-name{font-size:13px;color:var(--txt2);flex:1}
    .mp-shop-qty{font-size:11px;color:var(--indll);font-family:'JetBrains Mono',monospace;white-space:nowrap}

    /* ── Logo sweep animation ── */
    .wm-text{
      font-family:'Barlow Condensed',sans-serif;
      font-weight:900;
      font-size:20px;
      letter-spacing:0.05em;
      background:linear-gradient(90deg,#2B8AE0 0%,#82C2FF 35%,#B6D9FF 55%,#82C2FF 75%,#2B8AE0 100%);
      background-size:200% 100%;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:sweep 4s linear infinite;
      line-height:1.1;
    }
    .tg{
      font-family:'Barlow',sans-serif;
      font-weight:500;
      font-size:7px;
      text-transform:uppercase;
      letter-spacing:0.22em;
      margin-top:4px;
      color:rgba(130,194,255,0.65);
    }
    @keyframes sweep{
      0%{background-position:100% 0}
      100%{background-position:-100% 0}
    }

    /* Install Banner */
    .install-banner{
      position:fixed;top:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:var(--app-max-w);z-index:500;
      background:linear-gradient(135deg,rgba(99,102,241,0.97),rgba(139,92,246,0.97));
      backdrop-filter:blur(12px);
      padding:10px 16px;
      display:flex;align-items:center;gap:10px;
      box-shadow:0 4px 24px rgba(99,102,241,0.4);
      animation:slideDown 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .install-banner-icon{font-size:22px;flex-shrink:0}
    .install-banner-text{flex:1;font-size:12px;color:#fff;line-height:1.5}
    .install-banner-text strong{font-size:12px;font-weight:700;display:block;margin-bottom:1px}
    .install-banner-dismiss{
      background:rgba(255,255,255,0.2);border:none;border-radius:8px;
      color:#fff;font-size:11px;font-weight:600;padding:5px 10px;
      cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;white-space:nowrap;
    }
    .install-banner-dismiss:active{background:rgba(255,255,255,0.3)}
    /* Update banner */
    .update-banner{
      position:fixed;top:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:var(--app-max-w);z-index:600;
      background:linear-gradient(135deg,rgba(16,185,129,0.97),rgba(5,150,105,0.97));
      backdrop-filter:blur(12px);
      padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;
      display:flex;align-items:center;gap:10px;
      box-shadow:0 4px 24px rgba(16,185,129,0.45);
      animation:slideDown 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .update-banner-icon{font-size:20px;flex-shrink:0}
    .update-banner-text{flex:1;font-size:12px;color:#fff;line-height:1.4}
    .update-banner-text strong{font-size:13px;font-weight:700;display:block;margin-bottom:1px}
    .update-banner-restart{
      background:rgba(255,255,255,0.25);border:none;border-radius:8px;
      color:#fff;font-size:12px;font-weight:700;padding:6px 12px;
      cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;
      white-space:nowrap;letter-spacing:0.3px;
    }
    .update-banner-restart:active{background:rgba(255,255,255,0.4)}
    .update-banner-dismiss{
      background:none;border:none;color:rgba(255,255,255,0.7);
      font-size:18px;line-height:1;cursor:pointer;padding:2px 4px;flex-shrink:0;
    }

    /* ── Enhanced Food Detail ── */
    .det-name{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:3px;line-height:1.3}
    .det-brand{font-size:12px;color:var(--mu);margin-bottom:16px}
    .det-macro-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;background:var(--s2);border-radius:16px;padding:14px 10px}
    .det-macro-col{text-align:center}
    .det-macro-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.5px;line-height:1}
    .det-macro-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
    .det-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:8px}
    .serving-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .serving-pill{padding:7px 12px;border-radius:20px;border:1px solid var(--b1);background:var(--s2);color:var(--txt2);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .serving-pill.active{background:rgba(99,102,241,0.18);border-color:var(--ind);color:var(--indll)}
    .qty-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
    .qty-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--b1);background:var(--s2);color:var(--txt);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
    .qty-btn:active{background:var(--s3)}
    .qty-input{flex:1;text-align:center;font-size:20px;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:var(--txt)}
    .qty-unit{font-size:12px;color:var(--mu);text-align:center;margin-top:-8px;margin-bottom:14px}
    .custom-gram-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .custom-gram-row .field{flex:1;text-align:center;font-size:16px}

    /* iOS keyboard handling */
    @supports (height: 100dvh) {
      .sheet { max-height: 92dvh; }
    }

    /* Sticky search inside the modal */
    .search-sticky{position:sticky;top:0;z-index:10;background:var(--s1);padding-bottom:8px}

    /* ── Course Correction Card ── */
    .cc-card{border-radius:20px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;animation:ccSlide 0.4s ease}
    @keyframes ccSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .cc-card.gap{background:linear-gradient(145deg,#1a0d1e,#160d24);border:1px solid rgba(244,63,94,0.2)}

  return new Promise(function (resolve) {
    const img = new Image();

      const canvas = document.createElement("canvas");

        h = img.height;

        h = Math.round(h * (maxWidth / w));
        w = maxWidth;

      ctx.drawImage(img, 0, 0, w, h);

/* ── TDEE Calculator ── */
function calcTDEE(age, sex, heightCm, weightLbs, activity) {
  const kg = weightLbs * 0.453592;
  const cm = heightCm;
  // Mifflin-St Jeor
  const bmr = sex === "male" ? 10 * kg + 6.25 * cm - 5 * age + 5 : 10 * kg + 6.25 * cm - 5 * age - 161;
  const multipliers = {
    sedentary: 1.2,
    light: 1.375,
    moderate: 1.55,
    active: 1.725,
    veryactive: 1.9
  };
  return Math.round(bmr * (multipliers[activity] || 1.55));
}
function calcMacros(calories, goalType, weightLbs) {
  const protein = Math.round(weightLbs * (goalType === "bulk" ? 0.85 : 0.9));
  const fat = Math.round(calories * (goalType === "bulk" ? 0.28 : 0.25) / 9);
  const carbs = Math.round((calories - protein * 4 - fat * 9) / 4);
  return {
    protein,
    carbs: Math.max(carbs, 50),
    fat
  };
}
function calcCalorieTarget(tdee, goalType) {
  if (goalType === "cut") return Math.round(tdee - 400);
  if (goalType === "bulk") return Math.round(tdee + 250);
  return tdee;
}
function ftToCm(ft, inches) {
  return Math.round((parseInt(ft) || 0) * 30.48 + (parseInt(inches) || 0) * 2.54);
}

// Uses EMA trend weight + reverse-engineered TDEE from real calorie/weight data.

/* ── Exercise calorie estimator (MET-based) ── */
function calcExerciseCal(exercises, weightLbs) {

    var name = (ex.name || "").toLowerCase();
    if (ex.type === "cardio" && ex.duration) {
      var met = 7;
      if (name.includes("run") || name.includes("jog") || name.includes("sprint")) met = 10;
      else if (name.includes("walk")) met = 4;
      else if (name.includes("bike") || name.includes("cycl") || name.includes("spin")) met = 8;
      else if (name.includes("swim")) met = 8;
      else if (name.includes("elliptical") || name.includes("stair")) met = 7;
      else if (name.includes("row")) met = 8;
      else if (name.includes("hike")) met = 6;
      total += met * kg * (Number(ex.duration) / 60);
    } else if (ex.sets) {
      // Strength/bodyweight: ~3 min per set (1 min work + 2 min rest), 5 METs
      total += 5 * kg * (Number(ex.sets) * 3 / 60);
    }
  });
  return Math.round(total);
}

  function handleEditMacro(field, val) {
    const n = val.replace(/[^0-9.]/g, "");
    if (field === "qty") {

      setEditP(String(Math.round((editItem.p || 0) * ratio)));

    if (field === "c") { setEditC(n); if (!calManual) setEditCal(String(Math.round((parseFloat(editP)||0)*4 + (parseFloat(n)||0)*4 + (parseFloat(editF)||0)*9))); }

    if (field === "cal") {
      setCalManual(true);
      setEditCal(n);
      // Scale macros proportionally when calories edited directly
      const oldCal = editItem ? (editItem.cal || 1) : 1;
      const ratio = (parseFloat(n) || 0) / oldCal;
      setEditP(String(Math.round((parseFloat(editP)||0) * ratio)));
      setEditC(String(Math.round((parseFloat(editC)||0) * ratio)));
      setEditF(String(Math.round((parseFloat(editF)||0) * ratio)));

      c:   editC.trim()   !== "" ? Math.round(parseFloat(editC)   || 0) : (editItem.c   || 0),
      f:   editF.trim()   !== "" ? Math.round(parseFloat(editF)   || 0) : (editItem.f   || 0),

<script>
// Service worker registration — lives outside _initApp so updates always propagate
// even if React crashes or is still loading.
//
// Update flow (native-app style):
//   1. New SW installs → enters "waiting" state (does NOT skipWaiting automatically)
//   2. We store the waiting SW in window._swWaiting and fire "swupdateready"
//   3. React shows an "Update available — Restart" banner
//   4. User taps Restart → we post SKIP_WAITING → SW activates → controllerchange → reload
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").then(function (reg) {
      reg.update(); // Check for a new SW version on every page load

      function notifyUpdateReady(sw) {
        window._swWaiting = sw;
        window.dispatchEvent(new CustomEvent("swupdateready"));
      }

      // Already has a waiting SW (e.g. user refreshed after update was detected)
      if (reg.waiting && navigator.serviceWorker.controller) {
        notifyUpdateReady(reg.waiting);
      }

      reg.addEventListener("updatefound", function () {
        var nw = reg.installing;
        nw.addEventListener("statechange", function () {
          // "installed" + an existing controller = genuine update waiting
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            notifyUpdateReady(nw);
          }
        });
      });
    }).catch(function (e) { console.log("SW registration failed:", e); });

    // When the new SW takes control (after SKIP_WAITING), reload into the fresh version.
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      window.location.reload();
    });
  });
}
