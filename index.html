<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MacroTrack"/>
  <meta name="theme-color" content="#06060f"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>MacroTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Barlow:wght@500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#06060f;--s1:#0f0f20;--s2:#161628;--s3:#1e1e35;
      --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);
      --ind:#6366f1;--indl:#818cf8;--indll:#a5b4fc;--vio:#8b5cf6;--glow:rgba(99,102,241,0.25);
      --rose:#f43f5e;--rosel:#fb7185;
      --cyan:#06b6d4;--cyanl:#22d3ee;
      --amb:#f59e0b;--ambl:#fbbf24;
      --em:#10b981;--eml:#34d399;
      --txt:#f4f4ff;--txt2:#a0a0c8;--mu:#52527a;
      --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt)}
    body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
    #root{height:100%}
    .app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative}

    /* Header */
    .hdr{flex-shrink:0;padding:calc(var(--st) + 14px) 20px 0;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px}
    .logo em{color:var(--indl);font-style:normal}
    .hdr-r{text-align:right}
    .hdr-date{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace}

    /* Toast */
    .toast{position:fixed;top:calc(var(--st) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);z-index:999;background:var(--em);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;box-shadow:0 4px 20px rgba(16,185,129,0.4);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.35s;opacity:0;white-space:nowrap;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* Page */
    .page{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px calc(var(--sb) + 96px);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}

    /* Week selector */
    .week-nav{display:flex;align-items:center;gap:4px;margin-bottom:14px}
    .week-arrow{background:none;border:1px solid var(--b1);border-radius:10px;color:var(--mu);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:border-color 0.15s,color 0.15s}
    .week-arrow:active{border-color:var(--ind);color:var(--indl)}
    .week-days{display:flex;gap:3px;flex:1;overflow:visible;min-width:0}
    .day-pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:none;font-family:'DM Sans',sans-serif;min-width:0}
    .day-pill-letter{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--mu)}
    .day-pill-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--mu)}
    .day-pill.today .day-pill-letter,.day-pill.today .day-pill-num{color:var(--txt2)}
    .day-pill.today{border-color:var(--b1);background:var(--s1)}
    .day-pill.selected{background:var(--ind);border-color:var(--ind)}
    .day-pill.selected .day-pill-letter,.day-pill.selected .day-pill-num{color:#fff}
    .day-pill.has-data .day-pill-num::after{content:'·';display:block;width:4px;height:4px;border-radius:50%;background:var(--indll);margin:1px auto 0;font-size:0;line-height:0}
    .week-label{font-size:10px;color:var(--mu);text-align:center;margin-bottom:10px;font-family:'JetBrains Mono',monospace}

    /* Cal hero */
    .cal-hero{background:linear-gradient(145deg,#0f0f22 0%,#131328 60%,#0f1020 100%);border:1px solid var(--b2);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .cal-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(99,102,241,0.13) 0%,transparent 65%);pointer-events:none}
    .cal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .cal-lhs .cal-lbl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;font-weight:600}
    .cal-num{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:0.9;color:var(--txt)}
    .cal-unit{font-size:12px;color:var(--mu);margin-top:6px}
    .cal-rhs{text-align:right;padding-top:4px}
    .cal-rem-lbl{font-size:11px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
    .cal-rem-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600}
    .cal-rem-val.good{color:var(--indl)} .cal-rem-val.over{color:var(--rose)}
    .cal-rem-sub{font-size:11px;margin-top:3px} .cal-rem-sub.good{color:var(--em)} .cal-rem-sub.over{color:var(--rosel)}
    .pbar-track{height:7px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin-bottom:18px}
    .pbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ind),var(--vio),var(--indl));background-size:200%;animation:shim 3s linear infinite;transition:width 0.7s cubic-bezier(0.4,0,0.2,1)}
    .pbar-fill.over{background:linear-gradient(90deg,var(--rose),var(--rosel));animation:none}
    @keyframes shim{0%{background-position:100% 0}100%{background-position:-100% 0}}
    .macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .mpill{background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:14px;padding:11px 8px 9px;text-align:center;position:relative;overflow:hidden}
    .mpill::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
    .mpill.p::before{background:var(--rose)} .mpill.c::before{background:var(--cyan)} .mpill.f::before{background:var(--amb)}
    .mpill-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;margin-bottom:2px}
    .mpill.p .mpill-val{color:var(--rosel)} .mpill.c .mpill-val{color:var(--cyanl)} .mpill.f .mpill-val{color:var(--ambl)}
    .mpill-name{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
    .mpill-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin:0 4px}
    .mpill-bar-fill{height:100%;border-radius:2px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1)}
    .mpill.p .mpill-bar-fill{background:var(--rose)} .mpill.c .mpill-bar-fill{background:var(--cyan)} .mpill.f .mpill-bar-fill{background:var(--amb)}
    .mpill-goal{font-size:9px;color:var(--mu);margin-top:4px;font-family:'JetBrains Mono',monospace}

    /* Meals */
    .meal-block{margin-bottom:8px}
    .meal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:14px;cursor:pointer;user-select:none;transition:background 0.15s}
    .meal-hd:active{background:var(--s2)}
    .meal-hd.open{border-radius:14px 14px 0 0;border-bottom-color:transparent}
    .meal-hd-l{display:flex;align-items:center;gap:9px}
    .meal-emoji{font-size:17px}
    .meal-hd-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--txt2)}
    .meal-hd-r{display:flex;align-items:center;gap:9px}
    .meal-kcal{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mu)}
    .meal-add{width:28px;height:28px;border-radius:9px;background:var(--ind);border:none;color:#fff;font-size:20px;font-weight:300;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s,background 0.15s}
    .meal-add:active{transform:scale(0.9);background:var(--vio)}
    .meal-items{background:var(--s1);border:1px solid var(--b1);border-top:none;border-radius:0 0 14px 14px;overflow:hidden}
    .meal-empty{padding:12px 14px;font-size:12px;color:var(--mu);font-style:italic}
    .food-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1);animation:slin 0.22s ease}
    @keyframes slin{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
    .food-row:last-child{border-bottom:none}
    .food-info{flex:1;min-width:0}
    .food-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .food-srv{font-size:11px;color:var(--mu);margin-top:1px}
    .food-right{text-align:right;flex-shrink:0;margin-left:10px}
    .food-cal{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
    .food-mpw{font-size:10px;color:var(--mu);margin-top:2px;font-family:'JetBrains Mono',monospace}
    .food-del{background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer;padding:0 0 0 10px;line-height:1;flex-shrink:0;transition:color 0.15s}
    .food-del:active{color:var(--rose)}

    /* FAB */
    .fab{position:fixed;bottom:calc(var(--sb) + 76px);left:50%;transform:translateX(-50%);width:calc(min(430px,100vw) - 32px);max-width:398px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:18px;padding:15px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px var(--glow);z-index:40;transition:transform 0.15s}
    .fab:active{transform:translateX(-50%) scale(0.97)}

    /* Nav */
    .nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--sb) + 68px);padding-bottom:var(--sb);display:flex;align-items:flex-start;justify-content:space-around;padding-top:10px;background:rgba(6,6,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b1);z-index:50}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:2px 0}
    .nav-icon{font-size:20px;transition:transform 0.2s;display:block}
    .nav-lbl{font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--mu);font-family:'DM Sans',sans-serif;transition:color 0.2s}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--ind);opacity:0;transition:opacity 0.2s;margin-top:2px}
    .nav-btn.active .nav-lbl{color:var(--indl)}
    .nav-btn.active .nav-dot{opacity:1}
    .nav-btn.active .nav-icon{transform:translateY(-2px)}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding-bottom:env(keyboard-inset-height,0px);animation:fdin 0.2s ease}
    @keyframes fdin{from{opacity:0}to{opacity:1}}
    .sheet{background:var(--s1);border:1px solid var(--b2);border-radius:26px 26px 0 0;width:100%;max-width:430px;
      max-height:92dvh;max-height:92vh;
      overflow-y:auto;overflow-x:hidden;
      padding:20px 18px calc(var(--sb) + 30px);
      -webkit-overflow-scrolling:touch;
      animation:sup 0.3s cubic-bezier(0.4,0,0.2,1)}
    @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 20px}
    .sheet-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:18px}
    .tabs{display:flex;gap:6px;margin-bottom:18px}
    .tab-btn{flex:1;padding:9px 2px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:11px;color:var(--mu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
    .tab-btn.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
    .chip{padding:7px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:22px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:5px}
    .chip.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .fg{margin-bottom:12px}
    .fl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
    .field{width:100%;padding:12px 13px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none}
    .field:focus{border-color:var(--ind);background:rgba(99,102,241,0.06)}
    .field.fp:focus{border-color:var(--rose)} .field.fc:focus{border-color:var(--cyan)} .field.ff:focus{border-color:var(--amb)}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;cursor:pointer;margin-top:8px;box-shadow:0 4px 20px var(--glow);transition:transform 0.15s}
    .btn:active{transform:scale(0.98)} .btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
    .btn-ghost{width:100%;padding:14px;background:transparent;color:var(--mu);border:1px solid var(--b1);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:8px}
    .btn-sm{padding:0 14px;height:46px;flex-shrink:0;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer}
    .btn-danger{width:100%;padding:14px;background:rgba(244,63,94,0.1);color:var(--rose);border:1px solid rgba(244,63,94,0.3);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:6px;transition:background 0.15s}
    .btn-danger:active{background:rgba(244,63,94,0.2)}

    /* Search */
    .search-wrap{position:relative;margin-bottom:10px}
    .search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
    .search-field{width:100%;padding:12px 14px 12px 40px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
    .search-field:focus{border-color:var(--ind)}
    .sres{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--b1);border-radius:11px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s,background 0.15s}
    .sres:active{border-color:var(--ind);background:rgba(99,102,241,0.06)}
    .sr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
    .sr-sub{font-size:10px;color:var(--mu);margin-top:2px;font-family:'JetBrains Mono',monospace}
    .sr-cal{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--indll);flex-shrink:0;margin-left:8px}
    .detail-box{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.3);border-radius:16px;padding:16px;margin-top:8px}
    .det-name{font-size:15px;font-weight:600;margin-bottom:3px}
    .det-sub{font-size:11px;color:var(--mu);margin-bottom:14px}
    .m4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
    .m4c{text-align:center;background:rgba(255,255,255,0.04);border-radius:10px;padding:9px 3px;border:1px solid var(--b1)}
    .m4v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}
    .m4l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
    .ai-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;letter-spacing:0.5px;margin-bottom:10px}
    .scan-drop{border:2px dashed var(--b2);border-radius:18px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color 0.2s}
    .scan-drop:active{border-color:var(--ind)}
    .scan-prev{width:100%;border-radius:14px;margin-bottom:10px;max-height:220px;object-fit:cover}
    .scanner-wrap{position:relative;border-radius:18px;overflow:hidden;background:#000;aspect-ratio:1;margin-bottom:12px}
    .scanner-video{width:100%;height:100%;object-fit:cover;display:block}
    .scanner-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .scanner-box{width:60%;aspect-ratio:1;border:2px solid var(--indl);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);position:relative}
    .sc{position:absolute;width:20px;height:20px;border-color:var(--indl);border-style:solid}
    .sc.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:5px 0 0 0}
    .sc.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 5px 0 0}
    .sc.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 5px}
    .sc.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 5px 0}
    .scan-line{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,var(--indl),transparent);animation:sl 2s ease-in-out infinite;top:50%}
    @keyframes sl{0%,100%{transform:translateY(-30px);opacity:0.5}50%{transform:translateY(30px);opacity:1}}
    .scanner-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.6)}
    .loading-row{display:flex;align-items:center;gap:10px;color:var(--mu);font-size:13px;padding:12px 0}
    .spin{width:18px;height:18px;flex-shrink:0;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--ind);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err{color:var(--rose);font-size:12px;padding:5px 0}
    .ok-text{color:var(--em);font-size:12px;margin-top:8px;display:flex;align-items:center;gap:5px}

    /* Weight */
    .w-hero{background:linear-gradient(145deg,#0f0f22,#131328);border:1px solid var(--b2);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .w-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 65%);pointer-events:none}
    .w-lbl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:600}
    .w-big{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1}
    .w-big span{font-size:18px;color:var(--mu);font-family:'DM Sans',sans-serif;font-weight:300}
    .w-delta{font-size:13px;font-family:'JetBrains Mono',monospace;margin-top:5px}
    .w-delta.dn{color:var(--em)} .w-delta.up{color:var(--rose)}
    .chart-area{height:120px;margin:14px 0 4px}
    .wlog-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b1)}
    .wlog-row:last-child{border-bottom:none}
    .wlog-date{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace}
    .wlog-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}

    /* Adapt */
    .adapt{background:linear-gradient(145deg,#0d0d24,#111128);border:1px solid rgba(99,102,241,0.25);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
    .adapt::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(139,92,246,0.1) 0%,transparent 65%);pointer-events:none}
    .adapt.ontrack{border-color:rgba(16,185,129,0.3);background:linear-gradient(145deg,#0a1a14,#0d1e18)}
    .adapt-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .adapt-title{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--indll);letter-spacing:1px}
    .adapt.ontrack .adapt-title{color:var(--eml)}
    .adapt-body{font-size:13px;color:var(--txt2);line-height:1.65}
    .adapt-stats{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid rgba(99,102,241,0.15)}
    .ast{text-align:center}
    .ast-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px}
    .ast-val{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--indll);margin-top:4px}
    .unlock-dots{display:flex;gap:6px;margin-top:12px}
    .udot{height:5px;border-radius:3px;flex:1;background:rgba(255,255,255,0.07)}
    .udot.on{background:var(--ind)}

    /* Settings */
    .scard{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:20px;margin-bottom:12px}
    .stitle{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;font-weight:700}
    .srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1)}
    .srow:last-child{border-bottom:none}
    .slbl{font-size:14px}
    .sval{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--indll)}
    .prog-row{margin-bottom:12px}
    .prog-head{display:flex;justify-content:space-between;margin-bottom:5px}
    .prog-lbl{font-size:13px}
    .prog-val{font-size:11px;font-family:'JetBrains Mono',monospace}
    .muted-t{color:var(--mu);font-size:13px;line-height:1.65}

    /* Coach tab */
    .coach-hero{background:linear-gradient(145deg,#0d0d24 0%,#111130 60%,#0a0a20 100%);border:1px solid rgba(99,102,241,0.3);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .coach-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(139,92,246,0.15) 0%,transparent 65%);pointer-events:none}
    .coach-hero::after{content:'';position:absolute;bottom:-40px;left:-20px;width:160px;height:160px;background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 65%);pointer-events:none}
    .coach-hero-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative}
    .coach-hero-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--indll)}
    .coach-hero-sub{font-size:11px;color:var(--mu);margin-top:2px}
    .coach-regen{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:10px;color:var(--indll);font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .coach-regen:active{background:rgba(99,102,241,0.3)}
    .coach-regen:disabled{opacity:0.4;cursor:not-allowed}
    .report-loading{display:flex;align-items:center;gap:10px;color:var(--mu);font-size:13px;padding:8px 0}
    .report-body{font-size:14px;color:var(--txt2);line-height:1.75;position:relative}
    .report-body strong{color:var(--txt);font-weight:600}
    .report-body .bullet{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
    .report-body .bullet-dot{width:6px;height:6px;border-radius:50%;background:var(--indl);flex-shrink:0;margin-top:6px}
    .report-no-data{text-align:center;padding:16px 0}
    .report-no-data-icon{font-size:40px;margin-bottom:10px}
    .quick-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .quick-btn{padding:8px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:22px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .quick-btn:active{background:rgba(99,102,241,0.15);border-color:var(--ind);color:var(--indll)}
    /* ── Chat compact preview ── */
    .chat-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:20px;overflow:hidden;margin-bottom:14px}
    .chat-preview{padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background 0.15s}
    .chat-preview:active{background:var(--s2)}
    .chat-preview-left{display:flex;align-items:center;gap:12px}
    .chat-preview-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--vio));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .chat-preview-text{font-size:13px;color:var(--txt2);line-height:1.5}
    .chat-preview-title{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:2px}
    .chat-preview-arrow{color:var(--mu);font-size:18px;flex-shrink:0}

    /* ── Chat fullscreen overlay ── */
    .chat-fullscreen{
      position:fixed;inset:0;z-index:400;
      background:var(--bg);
      display:flex;flex-direction:column;
      max-width:430px;margin:0 auto;
      animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .chat-fs-header{
      display:flex;align-items:center;gap:12px;
      padding:calc(var(--st) + 8px) 16px 12px;
      border-bottom:1px solid var(--b1);
      background:var(--s1);flex-shrink:0;
    }
    .chat-fs-back{
      width:36px;height:36px;border-radius:50%;
      background:var(--s2);border:none;
      color:var(--txt);font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .chat-fs-title{font-size:16px;font-weight:600;color:var(--txt);flex:1}
    .chat-fs-sub{font-size:11px;color:var(--mu)}
    .chat-fs-usage{font-size:11px;color:var(--mu);text-align:right;flex-shrink:0}

    /* ── Messages ── */
    .chat-msgs{
      flex:1;overflow-y:auto;padding:16px;
      display:flex;flex-direction:column;gap:12px;
      -webkit-overflow-scrolling:touch;
    }
    .chat-msgs::-webkit-scrollbar{display:none}
    .msg{display:flex;flex-direction:column;gap:3px}
    .msg.user{align-items:flex-end}
    .msg.ai{align-items:flex-start}
    .msg-bubble{padding:11px 15px;border-radius:18px;max-width:88%;font-size:14px;line-height:1.65;word-break:break-word}
    .msg.user .msg-bubble{background:var(--ind);color:#fff;border-radius:18px 18px 4px 18px}
    .msg.ai .msg-bubble{background:var(--s1);color:var(--txt2);border-radius:18px 18px 18px 4px;border:1px solid var(--b1)}
    .msg.ai .msg-bubble strong{color:var(--txt)}
    .msg-time{font-size:10px;color:var(--mu);padding:0 4px}

    /* ── Input row ── */
    .chat-input-row{
      display:flex;align-items:flex-end;gap:8px;
      padding:10px 14px calc(var(--sb) + 12px);
      border-top:1px solid var(--b1);
      background:var(--s1);flex-shrink:0;
    }
    .chat-input{
      flex:1;padding:11px 16px;
      background:var(--s2);
      border:1px solid var(--b1);
      border-radius:22px;color:var(--txt);
      font-family:'DM Sans',sans-serif;font-size:15px;
      outline:none;transition:border-color 0.2s;
      resize:none;max-height:120px;line-height:1.5;
    }
    .chat-input:focus{border-color:rgba(99,102,241,0.5)}
    .chat-send{
      width:38px;height:38px;border-radius:50%;
      background:var(--ind);border:none;color:#fff;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:transform 0.15s,opacity 0.15s;
      margin-bottom:1px;
    }
    .chat-send svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .chat-send:active{transform:scale(0.9)}
    .chat-send:disabled{opacity:0.3;cursor:not-allowed;transform:none}

    /* ── Typing indicator ── */
    .typing-bubble{display:flex;align-items:center;gap:4px;padding:11px 15px}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--mu);animation:tdot 1.2s ease-in-out infinite}
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

    .no-worker-coach{background:linear-gradient(145deg,#0d0d24,#111130);border:1px solid rgba(99,102,241,0.25);border-radius:20px;padding:24px;text-align:center;margin-bottom:14px}
    .no-worker-icon{font-size:44px;margin-bottom:12px}
    .no-worker-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--indll);letter-spacing:1px;margin-bottom:8px}
    .no-worker-text{font-size:13px;color:var(--mu);line-height:1.65}

    /* ── Onboarding ── */
    .ob-wrap{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;overflow:hidden;max-width:430px;margin:0 auto}
    .ob-progress{height:3px;background:var(--b1);flex-shrink:0}
    .ob-progress-fill{height:100%;background:linear-gradient(90deg,var(--ind),var(--vio));transition:width 0.4s ease}
    .ob-body{flex:1;overflow-y:auto;padding:32px 24px 24px;-webkit-overflow-scrolling:touch}
    .ob-step-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;font-weight:700}
    .ob-title{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1.05;letter-spacing:1px;margin-bottom:8px}
    .ob-title em{color:var(--indl);font-style:normal}
    .ob-sub{font-size:14px;color:var(--txt2);line-height:1.65;margin-bottom:28px}
    .ob-footer{flex-shrink:0;padding:16px 24px calc(var(--sb) + 16px);border-top:1px solid var(--b1);background:var(--bg)}
    .ob-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:16px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 24px var(--glow);transition:transform 0.15s}
    .ob-btn:active{transform:scale(0.98)}
    .ob-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
    .ob-back{background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;padding:10px 0 0;display:block;margin:0 auto;font-family:'DM Sans',sans-serif}
    .ob-seg{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .ob-seg-btn{flex:1;min-width:80px;padding:11px 8px;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:12px;color:var(--mu);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;text-align:center}
    .ob-seg-btn.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .ob-field{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--b1);border-radius:14px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;margin-bottom:12px}
    .ob-field:focus{border-color:var(--ind)}
    .ob-field-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;margin-top:4px}
    .ob-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ob-result{background:linear-gradient(145deg,#0d0d24,#111130);border:1px solid rgba(99,102,241,0.3);border-radius:20px;padding:20px;margin-bottom:16px}
    .ob-result-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--indll);letter-spacing:1px;margin-bottom:14px}
    .ob-result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .ob-result-row:last-child{border-bottom:none}
    .ob-result-lbl{font-size:13px;color:var(--txt2)}
    .ob-result-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--indll)}
    .ob-macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
    .ob-macro{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--b1)}
    .ob-macro-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;margin-bottom:3px}
    .ob-macro-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px}
    .ob-edit-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b1)}
    .ob-edit-row:last-child{border-bottom:none}
    .ob-edit-lbl{font-size:13px;color:var(--txt2)}
    .ob-edit-input{width:90px;padding:8px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--b1);border-radius:10px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;text-align:right;-webkit-appearance:none}
    .ob-edit-input:focus{border-color:var(--ind)}
    /* Rate limit banner */
    .rate-banner{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
    .rate-banner-icon{font-size:22px;flex-shrink:0}
    .rate-banner-text{font-size:13px;color:var(--txt2);line-height:1.55}
    .rate-banner-text strong{color:var(--rosel)}

    /* Light mode */
    .light{
      --bg:#f4f4f8;--s1:#ffffff;--s2:#f0f0f5;--s3:#e8e8f0;
      --b1:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);
      --txt:#0d0d1a;--txt2:#3a3a5c;--mu:#8888aa;
    }
    .light .logo em{color:var(--ind)}
    .light .cal-hero{background:linear-gradient(145deg,#eeeef8 0%,#e8e8f5 60%,#f0f0fa 100%)}
    .light .w-hero{background:linear-gradient(145deg,#eeeef8,#e8e8f5)}
    .light .coach-hero{background:linear-gradient(145deg,#eaeaf5,#e4e4f0)}
    .light .adapt{background:linear-gradient(145deg,#eaeaf5,#e4e4f0)}
    .light .no-worker-coach{background:linear-gradient(145deg,#eaeaf5,#e4e4f0)}
    .light .msg.ai .msg-bubble{background:var(--s3);border-color:var(--b2)}
    .light .ob-wrap{background:var(--bg)}
    .light .ob-result{background:linear-gradient(145deg,#eaeaf5,#e4e4f0)}

    /* Settings panel */
    .settings-panel{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:300;background:var(--s1);border-bottom:1px solid var(--b2);padding:calc(var(--st) + 56px) 20px 20px;box-shadow:0 8px 32px rgba(0,0,0,0.25);animation:slideDown 0.25s cubic-bezier(0.4,0,0.2,1)}
    @keyframes slideDown{from{transform:translateX(-50%) translateY(-100%)}to{transform:translateX(-50%) translateY(0)}}
    .settings-panel-overlay{position:fixed;inset:0;z-index:299;background:rgba(0,0,0,0.4)}
    .sp-title{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:14px}
    .theme-row{display:flex;gap:10px;margin-bottom:4px}
    .theme-btn{flex:1;padding:14px 10px;border-radius:14px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;text-align:center;transition:all 0.15s;font-family:'DM Sans',sans-serif}
    .theme-btn.active{border-color:var(--ind);background:rgba(99,102,241,0.1)}
    .theme-btn-icon{font-size:24px;margin-bottom:4px}
    .theme-btn-label{font-size:12px;font-weight:600;color:var(--txt2)}
    .theme-btn.active .theme-btn-label{color:var(--ind)}
    .settings-gear{background:none;border:none;cursor:pointer;padding:4px;color:var(--mu);font-size:20px;transition:color 0.15s;line-height:1}
    .settings-gear:active{color:var(--indl)}

    /* Meal Plan tab */
    .mp-hero{background:linear-gradient(145deg,#0d0d24,#111130);border:1px solid rgba(99,102,241,0.3);border-radius:24px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .mp-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(139,92,246,0.12) 0%,transparent 65%);pointer-events:none}
    .mp-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--indll);margin-bottom:4px}
    .mp-sub{font-size:13px;color:var(--mu);margin-bottom:18px;line-height:1.5}
    .day-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .day-btn{width:44px;height:44px;border-radius:12px;border:1px solid var(--b1);background:var(--s2);color:var(--mu);font-size:14px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
    .day-btn.active{background:var(--ind);color:#fff;border-color:var(--ind)}
    .mp-generate{width:100%;padding:15px;background:linear-gradient(135deg,var(--ind),var(--vio));color:#fff;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 20px var(--glow);transition:transform 0.15s}
    .mp-generate:active{transform:scale(0.98)}
    .mp-generate:disabled{opacity:0.4;cursor:not-allowed;transform:none}
    .mp-day-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;margin-bottom:10px;overflow:hidden}
    .mp-day-header{padding:14px 16px;background:rgba(99,102,241,0.08);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
    .mp-day-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--indll)}
    .mp-day-macros{font-size:11px;color:var(--mu);font-family:'JetBrains Mono',monospace}
    .mp-meal-section{padding:14px 16px;border-bottom:1px solid var(--b1)}
    .mp-meal-section:last-child{border-bottom:none}
    .mp-meal-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:10px}
    .mp-food-item{display:flex;align-items:flex-start;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .mp-food-item:last-child{border-bottom:none}
    .mp-food-name{font-size:13px;font-weight:500;color:var(--txt);flex:1;margin-right:10px}
    .mp-food-weight{font-size:11px;color:var(--indll);font-family:'JetBrains Mono',monospace;white-space:nowrap;text-align:right}
    .mp-food-macros{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-top:2px}
    .mp-shopping-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:20px;margin-bottom:14px}
    .mp-shop-category{margin-bottom:14px}
    .mp-shop-category:last-child{margin-bottom:0}
    .mp-shop-cat-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:8px}
    .mp-shop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .mp-shop-item:last-child{border-bottom:none}
    .mp-shop-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--b2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .mp-shop-check.checked{background:var(--em);border-color:var(--em)}
    .mp-shop-name{font-size:13px;color:var(--txt2);flex:1}
    .mp-shop-qty{font-size:11px;color:var(--indll);font-family:'JetBrains Mono',monospace;white-space:nowrap}

    /* ── Logo sweep animation ── */
    .wm-text{
      font-family:'Barlow Condensed',sans-serif;
      font-weight:900;
      font-size:20px;
      letter-spacing:0.05em;
      background:linear-gradient(90deg,#6366f1 0%,#a78bfa 35%,#c084fc 55%,#a78bfa 75%,#6366f1 100%);
      background-size:200% 100%;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:sweep 4s linear infinite;
      line-height:1.1;
    }
    .tg{
      font-family:'Barlow',sans-serif;
      font-weight:500;
      font-size:7px;
      text-transform:uppercase;
      letter-spacing:0.22em;
      margin-top:4px;

    /* iOS keyboard handling */

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── Constants ── */
const MEALS=[{id:"Breakfast",emoji:"🌅"},{id:"Lunch",emoji:"☀️"},{id:"Dinner",emoji:"🌙"},{id:"Snacks",emoji:"🍎"}];
const DAY_LETTERS=["Su","M","Tu","W","Th","F","Sa"];
const DEFAULT_GOALS={calories:2100,protein:180,carbs:210,fat:60,targetWeight:200,goalType:"cut"};
const USDA="https://api.nal.usda.gov/fdc/v1";

/* ── Worker URL — hardcoded so users need zero configuration ── */
const DEFAULT_WORKER_URL = "https://macrotrack-ai.kjgoodwin01.workers.dev";

/* ── Device ID — persistent anonymous user identifier ── */
function getDeviceId(){
  let id=localStorage.getItem("mt_device_id");
  if(!id){
    id="dev_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
    localStorage.setItem("mt_device_id",id);
  }
  return id;
}
const DEVICE_ID=getDeviceId();

/* ── Sync helper — fire and forget, localStorage is source of truth ── */
async function syncToCloud(workerUrl, type, payload){
  const url=workerUrl||DEFAULT_WORKER_URL;
  if(!url)return Promise.resolve();
  try{
    await fetch(url.replace(/\/$/,""),{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(Object.assign({type:type,deviceId:DEVICE_ID},payload)),
    });
  }catch(e){}
  return Promise.resolve();
}

/* ── Load from cloud on first open ── */
async function loadFromCloud(workerUrl){
  workerUrl=workerUrl||DEFAULT_WORKER_URL;
  if(!workerUrl)return null;
  try{
    const r=await fetch(workerUrl.replace(/\/$/,""),{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({type:"sync_load",deviceId:DEVICE_ID}),
    });
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null;}
}


/* ── Date helpers ── */
function isoDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayISO(){return isoDate(new Date());}
function getMondayOfWeek(d){
  const dt=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const day=dt.getDay();const diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff);return dt;
}
function getWeekDates(monday){
  return Array.from({length:7},(_,i)=>{const d=new Date(monday.getFullYear(),monday.getMonth(),monday.getDate()+i);return d;});
}
function fmtDate(d){return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function fmtShort(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}

/* ── Week key helper — global so all components can access it ── */
function getWeekKey(){
  return isoDate(getMondayOfWeek(new Date()));
}

/* ── localStorage persistence ── */
// Robust save with verification and retry
function lsSave(key,val){
  try{localStorage.setItem(key,JSON.stringify(val));return true;}
  catch(e){return false;}
}
function lsLoad(key,init){
  try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}
}
function useLocal(k,init){
  const [v,setV]=useState(()=>lsLoad(k,init));
  const ref=useRef(v);
  ref.current=v;
  const set=useCallback((val)=>{
    setV(function(prev){
      const next=typeof val==="function"?val(prev):val;
      ref.current=next;
      lsSave(k,next);
      return next;
    });
  },[k]);
  return [v,set];
}

/* ── USDA helpers ── */
function getNutrient(arr,id){const n=(arr||[]).find(x=>x.nutrientId===id||x.nutrientNumber===String(id));return Math.round((n&&n.value)?n.value:0);}
function parseFood(item){
  const n=item.foodNutrients||[];
  const servings=[];

  // Helper: clean up messy serving labels from the database
  function cleanLabel(raw, grams){
    if(!raw)return grams+"g";
    // Remove duplicate gram info like "1 bar (60g) (60g)"
    const deduped=raw.replace(/\s*\(\d+\.?\d*\s*g\)\s*\(\d+\.?\d*\s*g\)/gi,"");
    // If label is just a number or "1.0 serving" with no useful info, use grams
    if(/^[\d\.]+\s*(serving|servings|unit|units)?$/i.test(deduped.trim()))return grams+"g";
    // If label doesn't already have grams, append it
    if(grams&&!/\d+\s*g/i.test(deduped))return deduped.trim()+" ("+Math.round(grams)+"g)";
    return deduped.trim();
  }

  // Primary serving size from the item
  if(item.servingSize&&item.servingSize>0){
    const unit=item.servingSizeUnit||"g";
    const grams=unit.toLowerCase()==="g"?item.servingSize:unit.toLowerCase()==="oz"?item.servingSize*28.35:item.servingSize;
    const label=item.householdServingFullText?cleanLabel(item.householdServingFullText,grams):"1 serving ("+Math.round(grams)+"g)";
    servings.push({label:label,grams:Math.round(grams)});
  }

  // Additional portions from the database
  (item.foodPortions||[]).forEach(function(p){
    if(!p.gramWeight||p.gramWeight<=0)return;
    const raw=p.portionDescription||(p.measureUnit&&p.measureUnit.name)||"serving";
    const label=cleanLabel(raw,p.gramWeight);
    // Don't add duplicate gram weights
    if(!servings.find(function(s){return Math.abs(s.grams-p.gramWeight)<2;})){
      servings.push({label:label,grams:Math.round(p.gramWeight)});
    }
  });

  // Always offer 100g as a fallback option
  if(!servings.find(function(s){return s.grams===100;})){
    servings.push({label:"100g",grams:100});
  }

  // If we still have nothing useful, just use 100g
  if(servings.length===0)servings.push({label:"100g",grams:100});

  return{
    fdcId:item.fdcId,
    name:item.description||"",
    brand:item.brandOwner||item.brandName||"",
    dataType:item.dataType||"",
    cal100:getNutrient(n,1008),
    p100:getNutrient(n,1003),
    c100:getNutrient(n,1005),
    f100:getNutrient(n,1004),
    servings:servings,
  };
}
function scaleMacros(food,grams,qty){const f=(grams*(parseFloat(qty)||1))/100;return{cal:Math.round(food.cal100*f),p:Math.round(food.p100*f),c:Math.round(food.c100*f),f:Math.round(food.f100*f)};}

/* ── Toast ── */
function Toast({msg}){
  const [show,setShow]=useState(false);
  useEffect(()=>{if(!msg)return;setShow(true);const t=setTimeout(()=>setShow(false),2200);return()=>clearTimeout(t);},[msg]);
  return <div className={"toast"+(show?" show":"")}>{msg}</div>;
}

/* ── CalHero ── */
function CalHero({logged,goals}){
  const pct=Math.min((logged.calories/goals.calories)*100,100);
  const rem=goals.calories-logged.calories;const over=rem<0;
  const pp=Math.min((logged.protein/goals.protein)*100,100);
  const pc=Math.min((logged.carbs/goals.carbs)*100,100);
  const pf=Math.min((logged.fat/goals.fat)*100,100);
  return(
    <div className="cal-hero">
      <div className="cal-top">
        <div className="cal-lhs">
          <div className="cal-lbl">Calories</div>
          <div className="cal-num">{logged.calories.toLocaleString()}</div>
          <div className="cal-unit">kcal consumed</div>
        </div>
        <div className="cal-rhs">
          <div className="cal-rem-lbl">{over?"Over by":"Remaining"}</div>
          <div className={"cal-rem-val "+(over?"over":"good")}>{Math.abs(rem).toLocaleString()}</div>
          <div className={"cal-rem-sub "+(over?"over":"good")}>{over?"⬆ over budget":"⬇ to goal"}</div>
        </div>
      </div>
      <div className="pbar-track"><div className={"pbar-fill"+(over?" over":"")} style={{width:pct+"%"}}/></div>
      <div className="macro-row">
        <div className="mpill p"><div className="mpill-val">{logged.protein}g</div><div className="mpill-name">Protein</div><div className="mpill-bar"><div className="mpill-bar-fill" style={{width:pp+"%"}}/></div><div className="mpill-goal">{goals.protein}g goal</div></div>
        <div className="mpill c"><div className="mpill-val">{logged.carbs}g</div><div className="mpill-name">Carbs</div><div className="mpill-bar"><div className="mpill-bar-fill" style={{width:pc+"%"}}/></div><div className="mpill-goal">{goals.carbs}g goal</div></div>
        <div className="mpill f"><div className="mpill-val">{logged.fat}g</div><div className="mpill-name">Fat</div><div className="mpill-bar"><div className="mpill-bar-fill" style={{width:pf+"%"}}/></div><div className="mpill-goal">{goals.fat}g goal</div></div>
      </div>
    </div>
  );
}

/* ── WeekSelector ── */
function WeekSelector({selectedDate,onSelect,weekOffset,onOffsetChange,entries}){
  const today=new Date();today.setHours(0,0,0,0);
  const baseMonday=getMondayOfWeek(today);
  const monday=new Date(baseMonday);monday.setDate(monday.getDate()+weekOffset*7);
  const days=getWeekDates(monday);
  const isThisWeek=weekOffset===0;
  const weekLabel=fmtShort(days[0])+" – "+fmtShort(days[6]);

  return(
    <div>
      <div className="week-nav">
        <button className="week-arrow" onClick={()=>onOffsetChange(weekOffset-1)}>‹</button>
        <div className="week-days">
          {days.map((d,i)=>{
            const iso=isoDate(d);
            const isToday=isoDate(d)===isoDate(today);
            const isSel=iso===selectedDate;
            const hasData=(entries[iso]||[]).length>0;
            const letter=["M","Tu","W","Th","F","Sa","Su"][i];
            return(
              <button key={iso} className={"day-pill"+(isToday?" today":"")+(isSel?" selected":"")+(hasData&&!isSel?" has-data":"")} onClick={()=>onSelect(iso)}>
                <span className="day-pill-letter">{letter}</span>
                <span className="day-pill-num">{d.getDate()}</span>
              </button>
            );
          })}
        </div>
        <button className="week-arrow" onClick={()=>onOffsetChange(Math.min(0,weekOffset+1))} disabled={weekOffset===0} style={{opacity:weekOffset===0?0.3:1}}>›</button>
      </div>
      <div className="week-label">{isThisWeek?"This week":"Week of"} {weekLabel}</div>
    </div>
  );
}

/* ── WeightChart ── */
function WeightChart({data}){
  if(data.length<2)return <div style={{padding:"16px 0",textAlign:"center",color:"var(--mu)",fontSize:12}}>Log 2+ entries to see your trend</div>;
  const vals=data.map(d=>d.weight);const lo=Math.min(...vals)-2,hi=Math.max(...vals)+2;
  const W=370,H=110,xs=W/(data.length-1);
  const ys=v=>H-((v-lo)/(hi-lo))*H;
  const pts=data.map((d,i)=>`${i*xs},${ys(d.weight)}`).join(" ");
  const area=`0,${H} ${pts} ${(data.length-1)*xs},${H}`;
  return(
    <div className="chart-area">
      <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" stopOpacity="0.35"/><stop offset="100%" stopColor="#6366f1" stopOpacity="0"/></linearGradient></defs>
        <polygon points={area} fill="url(#cg)"/>
        <polyline points={pts} fill="none" stroke="#818cf8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i)=><circle key={i} cx={i*xs} cy={ys(d.weight)} r="4" fill="#6366f1" stroke="#a5b4fc" strokeWidth="1.5"/>)}
      </svg>
    </div>
  );
}

/* ── FoodDetail ── */
function FoodDetail({food,meal,onBack,onConfirm}){
  const [si,setSi]=useState(0);
  const [qty,setQty]=useState(1);
  const [customGrams,setCustomGrams]=useState("");
  const [useCustom,setUseCustom]=useState(false);

  const serv=food.servings[si];

  // Effective grams — either from serving+qty or custom input
  const effectiveGrams=useCustom
    ?(parseFloat(customGrams)||0)
    :(serv.grams*(qty||1));

  const m=useCustom
    ?scaleMacros(food,parseFloat(customGrams)||0,1)
    :scaleMacros(food,serv.grams,qty);

  function stepQty(delta){
    setQty(function(prev){
      const next=Math.round((prev+delta)*10)/10;
      return Math.max(0.5,next);
    });
  }

  function selectServing(idx){
    setSi(idx);
    setUseCustom(false);
    setCustomGrams("");
  }

  function handleCustomGrams(val){
    setCustomGrams(val);
    setUseCustom(val.length>0);
  }

  const servingLabel=useCustom
    ?customGrams+"g"
    :qty+"x "+serv.label;

  return(
    <div className="detail-box">
      {/* Food name and brand */}
      <div className="det-name">{food.name}</div>
      <div className="det-brand">{food.brand||food.dataType}</div>

      {/* Macro hero — updates live */}
      <div className="det-macro-hero">
        <div className="det-macro-col">
          <div className="det-macro-val" style={{color:"var(--indll)"}}>{m.cal}</div>
          <div className="det-macro-lbl">kcal</div>
        </div>
        <div className="det-macro-col">
          <div className="det-macro-val" style={{color:"var(--rosel)"}}>{m.p}g</div>
          <div className="det-macro-lbl">Protein</div>
        </div>
        <div className="det-macro-col">
          <div className="det-macro-val" style={{color:"var(--cyanl)"}}>{m.c}g</div>
          <div className="det-macro-lbl">Carbs</div>
        </div>
        <div className="det-macro-col">
          <div className="det-macro-val" style={{color:"var(--ambl)"}}>{m.f}g</div>
          <div className="det-macro-lbl">Fat</div>
        </div>
      </div>

      {/* Serving size pills */}
      <div className="det-section-label">Serving Size</div>
      <div className="serving-pills">
        {food.servings.map(function(s,i){
          return(
            <button key={i}
              className={"serving-pill"+(si===i&&!useCustom?" active":"")}
              onClick={function(){selectServing(i);}}>
              {s.label}
            </button>
          );
        })}
      </div>

      {/* Quantity stepper — only show when not using custom grams */}
      {!useCustom&&(
        <div>
          <div className="det-section-label">Quantity</div>
          <div className="qty-row">
            <button className="qty-btn" onClick={function(){stepQty(-0.5);}}>−</button>
            <input
              className="field qty-input"
              type="number"
              step="0.5"
              min="0.5"
              value={qty}
              onChange={function(e){setQty(parseFloat(e.target.value)||1);}}
            />
            <button className="qty-btn" onClick={function(){stepQty(0.5);}}>+</button>
          </div>
          <div className="qty-unit">{Math.round(effectiveGrams)}g total</div>
        </div>
      )}

      {/* Custom grams option */}
      <div className="det-section-label">Or enter exact grams</div>
      <div className="custom-gram-row">
        <input
          className="field"
          type="number"
          placeholder={"e.g. "+Math.round(serv.grams)}
          value={customGrams}
          onChange={function(e){handleCustomGrams(e.target.value);}}
          style={{flex:1,textAlign:"center",fontSize:16}}
        />
        <div style={{fontSize:13,color:"var(--mu)",flexShrink:0}}>grams</div>
        {useCustom&&(
          <button onClick={function(){setUseCustom(false);setCustomGrams("");}}
            style={{background:"none",border:"none",color:"var(--mu)",cursor:"pointer",fontSize:18,padding:"0 4px"}}>
            ×
          </button>
        )}
      </div>

      <button className="btn" onClick={function(){
        if(effectiveGrams<=0)return;
        onConfirm({name:food.name,serving:servingLabel,meal,cal:m.cal,p:m.p,c:m.c,f:m.f});
      }}>
        Add to {meal}
      </button>
      <button className="btn-ghost" onClick={onBack}>← Back to search</button>
    </div>
  );
}

/* ── BarcodeScanner ── */
function BarcodeScanner({onDetected}){
  const videoRef=useRef(null);
  const displayRef=useRef(null);
  const [status,setStatus]=useState("starting");
  const [code,setCode]=useState("");
  const [manualCode,setManualCode]=useState("");
  const detectedRef=useRef(false);
  const streamRef=useRef(null);
  const timerRef=useRef(null);

  useEffect(()=>{
    let dead=false;

    async function go(){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({
          video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}
        });
        if(dead){stream.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
        if(displayRef.current){displayRef.current.srcObject=stream;displayRef.current.play().catch(function(){});}
      }catch(e){if(!dead)setStatus("error");return;}
      if(!dead){setStatus("scanning");scan();}
    }

    function drawRotated(video, angleDeg){
      // Draw a video frame onto a new canvas rotated by angleDeg
      const rad=angleDeg*(Math.PI/180);
      const vw=video.videoWidth;
      const vh=video.videoHeight;
      // For 90/-90 degree rotations, swap width/height
      const abs=Math.abs(angleDeg)===90||Math.abs(angleDeg)===270;
      const cw=abs?vh:vw;
      const ch=abs?vw:vh;
      const c=document.createElement("canvas");
      c.width=cw;c.height=ch;
      const ctx=c.getContext("2d");
      ctx.translate(cw/2,ch/2);
      ctx.rotate(rad);
      ctx.drawImage(video,-vw/2,-vh/2,vw,vh);
      return c;
    }

    async function tryDetect(canvas){
      // Try BarcodeDetector first
      try{
        const BD=window.BarcodeDetector||globalThis.BarcodeDetector;
        if(BD){
          const det=new BD({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39"]});
          const results=await det.detect(canvas);
          if(results&&results.length>0&&results[0].rawValue.length>=6)return results[0].rawValue;
        }
      }catch(e){}
      // Fall back to Quagga decodeSingle
      if(window.Quagga){
        return new Promise(function(resolve){
          try{
            Quagga.decodeSingle({
              decoder:{readers:["ean_reader","ean_8_reader","upc_reader","upc_e_reader","code_128_reader"]},
              locate:true,
              src:canvas.toDataURL("image/jpeg",0.9),
            },function(result){
              if(result&&result.codeResult&&result.codeResult.code&&result.codeResult.code.length>=6){
                resolve(result.codeResult.code);
              }else{resolve(null);}
            });
          }catch(e){resolve(null);}
        });
      }
      return null;
    }

    async function scan(){
      if(dead||detectedRef.current)return;
      const video=videoRef.current;
      if(!video||video.readyState<2||!video.videoWidth){
        timerRef.current=setTimeout(function(){if(!dead)scan();},100);
        return;
      }

      // Try all 4 orientations — whichever one finds the barcode wins
      // This guarantees it works no matter how the phone is held
      const angles=[0,-90,90,180];
      for(let i=0;i<angles.length;i++){
        if(dead||detectedRef.current)return;
        try{
          const canvas=drawRotated(video,angles[i]);
          const val=await tryDetect(canvas);
          if(val){
            if(!dead&&!detectedRef.current){
              detectedRef.current=true;
              setCode(val);
              setStatus("success");
              if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
              setTimeout(function(){onDetected(val);},300);
            }
            return;
          }
        }catch(e){}
      }

      // Nothing found in any orientation — try again shortly
      timerRef.current=setTimeout(function(){if(!dead&&!detectedRef.current)scan();},100);
    }

    go();
    return function(){
      dead=true;detectedRef.current=true;
      if(timerRef.current)clearTimeout(timerRef.current);
      if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    };
  },[]);

  function submitManual(){
    const c=manualCode.trim();
    if(c.length>=6)onDetected(c);
  }

  return(
    <div>
      <video ref={videoRef} style={{display:"none"}} muted playsInline/>
      <div style={{position:"relative",width:"100%",paddingBottom:"100%",background:"#111",borderRadius:18,overflow:"hidden",marginBottom:10}}>
        <video ref={displayRef} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}} muted playsInline/>
        {status==="starting"&&(
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,background:"rgba(0,0,0,0.7)"}}>
            <div className="spin"/>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>Starting camera...</div>
          </div>
        )}
        {status==="scanning"&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <div style={{width:"80%",height:"38%",border:"2px solid rgba(99,102,241,0.95)",borderRadius:12,position:"relative",boxShadow:"0 0 0 9999px rgba(0,0,0,0.45)"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,var(--indl),transparent)",animation:"sl 1.5s ease-in-out infinite"}}/>
              <div className="sc tl"/><div className="sc tr"/>
              <div className="sc bl"/><div className="sc br"/>
            </div>
          </div>
        )}
        {status==="error"&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.8)"}}>
            <div style={{textAlign:"center",padding:20}}>
              <div style={{fontSize:32,marginBottom:8}}>📷</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>Camera unavailable — type barcode below</div>
            </div>
          </div>
        )}
        {status==="success"&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(16,185,129,0.3)"}}>
            <div style={{fontSize:64}}>✅</div>
          </div>
        )}
      </div>
      {status==="scanning"&&<div style={{textAlign:"center",fontSize:12,color:"var(--mu)",marginBottom:10}}>Center barcode in the frame</div>}
      {status==="success"&&<div style={{textAlign:"center",fontSize:13,color:"var(--em)",marginBottom:10,fontFamily:"'JetBrains Mono',monospace"}}>✓ {code}</div>}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <input className="field" placeholder="Or type barcode manually" value={manualCode}
          onChange={function(e){setManualCode(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter")submitManual();}}
          style={{flex:1,fontSize:13}}/>
        <button className="btn-sm" onClick={submitManual} disabled={manualCode.trim().length<6}>Go</button>
      </div>
    </div>
  );
}

// Compress image using canvas to stay under API size limits
function compressImage(dataUrl,maxWidth,quality){
  return new Promise(function(resolve){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height;
      if(w>maxWidth){h=Math.round(h*(maxWidth/w));w=maxWidth;}
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL("image/jpeg",quality));
    };
    img.src=dataUrl;
  });
}

/* ── TDEE Calculator ── */
function calcTDEE(age, sex, heightCm, weightLbs, activity){
  const kg = weightLbs * 0.453592;
  const cm = heightCm;
  // Mifflin-St Jeor
  const bmr = sex === "male"
    ? 10*kg + 6.25*cm - 5*age + 5
    : 10*kg + 6.25*cm - 5*age - 161;
  const multipliers = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725, veryactive:1.9};
  return Math.round(bmr * (multipliers[activity] || 1.55));
}

function calcMacros(calories, goalType, weightLbs){
  const protein = Math.round(weightLbs * (goalType === "bulk" ? 0.85 : 0.9));
  const fat = Math.round(calories * (goalType === "bulk" ? 0.28 : 0.25) / 9);
  const carbs = Math.round((calories - protein*4 - fat*9) / 4);
  return {protein, carbs: Math.max(carbs, 50), fat};
}

function calcCalorieTarget(tdee, goalType){
  if(goalType === "cut") return Math.round(tdee - 400);
  if(goalType === "bulk") return Math.round(tdee + 250);
  return tdee;
}

function ftToCm(ft, inches){
  return Math.round((parseInt(ft)||0)*30.48 + (parseInt(inches)||0)*2.54);
}

/* ── Onboarding ── */
function Onboarding({onComplete}){
  const [step, setStep] = useState(0);
  const [name, setName] = useState("");
  const [sex, setSex] = useState("male");
  const [age, setAge] = useState("");
  const [heightFt, setHeightFt] = useState("");
  const [heightIn, setHeightIn] = useState("");
  const [weight, setWeight] = useState("");
  const [activity, setActivity] = useState("moderate");
  const [goalType, setGoalType] = useState("cut");
  const [targetWeight, setTargetWeight] = useState("");
  const [editMode, setEditMode] = useState(false);
  const [editCal, setEditCal] = useState("");

  const [editProt, setEditProt] = useState("");
  const [editCarb, setEditCarb] = useState("");
  const [editFat, setEditFat] = useState("");

  const TOTAL_STEPS = 5;
  const pct = ((step) / TOTAL_STEPS) * 100;

  const heightCm = ftToCm(heightFt, heightIn);
  const tdee = age && weight && heightCm ? calcTDEE(parseInt(age), sex, heightCm, parseFloat(weight), activity) : 0;
  const recCal = tdee ? calcCalorieTarget(tdee, goalType) : 0;
  const recMacros = recCal ? calcMacros(recCal, goalType, parseFloat(weight)) : null;

  function initEdit(){
    setEditCal(String(recCal));
    setEditProt(String(recMacros.protein));
    setEditCarb(String(recMacros.carbs));
    setEditFat(String(recMacros.fat));
    setEditMode(true);
  }

  function finish(){
    const finalCal = editMode ? parseInt(editCal)||recCal : recCal;
    const finalProt = editMode ? parseInt(editProt)||recMacros.protein : recMacros.protein;
    const finalCarb = editMode ? parseInt(editCarb)||recMacros.carbs : recMacros.carbs;
    const finalFat = editMode ? parseInt(editFat)||recMacros.fat : recMacros.fat;
    onComplete({
      name: name.trim(),
      goals: {
        calories: finalCal, protein: finalProt, carbs: finalCarb, fat: finalFat,
        targetWeight: parseFloat(targetWeight)||null,
        goalType: goalType,
      },
      startWeight: parseFloat(weight)||null,
    });
  }

  const ACTIVITY_OPTS = [
    {id:"sedentary", label:"Sedentary", sub:"Desk job, no gym"},
    {id:"light", label:"Light", sub:"1-2x / week"},
    {id:"moderate", label:"Moderate", sub:"3-4x / week"},
    {id:"active", label:"Active", sub:"5-6x / week"},
    {id:"veryactive", label:"Very Active", sub:"2x/day or labor"},
  ];

  const canNext = [
    name.trim().length > 0,
    age && weight && heightFt,
    true,

        {step > 0 && <button className="ob-back" onClick={function(){setStep(step-1);}}>← Back</button>}
      </div>
    </div>
  );
}


/* ── Meal Plan Tab ── */
function MealPlanTab({goals, workerUrl, entries, wlog}){
  const [days, setDays] = useLocal("mt_mp_days", 5);
  const [plan, setPlan] = useLocal("mt_mp_plan", null);
  const [planDate, setPlanDate] = useLocal("mt_mp_date", "");
  const [mpGenUsage, setMpGenUsage] = useLocal("mt_mp_usage", {});

  // Convert kg/g shopping quantities to US measurements
  function convertToUS(qty){
    if(!qty)return qty;
    const s=String(qty).trim().toLowerCase();
    // Check for kg pattern: "1.5kg", "1.5 kg"
    if(s.indexOf("kg")!==-1){
      const num=parseFloat(s);
      if(!isNaN(num)){
        const lbs=num*2.205;
        return lbs>=1?lbs.toFixed(1)+" lbs":Math.round(lbs*16)+" oz";
      }
    }
    // Check for standalone g pattern: "800g", "800 g" — but not "bag" or other words
    if(s.indexOf(" g")!==-1||(s.length>1&&s[s.length-1]==="g"&&!isNaN(parseFloat(s)))){
      const num=parseFloat(s);
      if(!isNaN(num)){
        const oz=num*0.03527;
        return oz>=16?(oz/16).toFixed(1)+" lbs":oz.toFixed(1)+" oz";
      }
    }
    return qty;
  }

  // Apply US conversion to entire shopping list
  function convertPlanUnits(p){
    if(!p||!p.shoppingList)return p;
    const newList={};
    Object.keys(p.shoppingList).forEach(function(cat){
      newList[cat]=(p.shoppingList[cat]||[]).map(function(item){
        return Object.assign({},item,{qty:convertToUS(item.qty)});
      });
    });
    return Object.assign({},p,{shoppingList:newList});
  }

    // Clear old plans with kg values — new system calculates shopping list correctly
  useEffect(function(){
    if(plan&&plan.shoppingList){
      const planStr=JSON.stringify(plan.shoppingList).toLowerCase();
      if(planStr.indexOf("kg")!==-1||planStr.indexOf('" g"')!==-1){
        setPlan(null);
        setPlanDate("");
        const k=getWeekKey();
        setMpGenUsage(function(prev){const n=Object.assign({},prev);n[k]=0;return n;});
      }
    }
  },[]);

  const MP_WEEKLY_LIMIT = 1;

  function getMpGenThisWeek(){
    const k=getWeekKey();
    return (mpGenUsage[k]||0);
  }

  function incrementMpGen(){
    const k=getWeekKey();
    setMpGenUsage(function(prev){
      const n=Object.assign({},prev);
      n[k]=(n[k]||0)+1;
      const keys=Object.keys(n).sort();
      if(keys.length>4)keys.slice(0,keys.length-4).forEach(function(old){delete n[old];});
      return n;
    });
  }

  function getMpResetMessage(){
    const today=new Date();
    const mon=getMondayOfWeek(new Date());
    const nextMon=new Date(mon);
    nextMon.setDate(nextMon.getDate()+7);
    const days=Math.ceil((nextMon-today)/(1000*60*60*24));
    const resetDate=nextMon.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
    if(days===1)return "Your next generation unlocks tomorrow, "+resetDate+".";
    return "Your next generation unlocks in "+days+" days, on "+resetDate+".";
  }
  const [prefs, setPrefs] = useLocal("mt_mp_prefs", {
    proteins: [],
    carbs: [],
    fats: [],
    restrictions: [],
    cookingSkill: "intermediate",
    custom: "",
  });
  const [showPrefs, setShowPrefs] = useState(false);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [openDays, setOpenDays] = useState({});
  const [checked, setChecked] = useState({});

  const PROTEIN_OPTS = ["Chicken","Turkey","Beef","Salmon","Tuna","Shrimp","Eggs","Greek Yogurt","Cottage Cheese","Tofu","Tempeh"];
  const CARB_OPTS = ["White Rice","Brown Rice","Oats","Sweet Potato","Quinoa","Pasta","Bread","Fruits","Potatoes"];
  const FAT_OPTS = ["Avocado","Olive Oil","Nuts","Nut Butter","Cheese","Whole Eggs","Salmon"];
  const RESTRICTION_OPTS = ["Gluten Free","Dairy Free","Keto","Vegetarian","Vegan","No Pork","Nut Free","Low Sodium"];

  function togglePref(key, val){
    setPrefs(function(p){
      const arr = p[key] || [];
      const exists = arr.includes(val);
      return Object.assign({}, p, {[key]: exists ? arr.filter(function(v){return v!==val;}) : arr.concat([val])});
    });
  }

  function buildPrefsText(){
    const parts = [];
    // Cooking skill
    const skillMap = {
      beginner: "beginner cook — keep recipes very simple, minimal ingredients, basic techniques only (boiling, grilling, microwave)",
      intermediate: "intermediate cook — comfortable with standard meal prep techniques",
      advanced: "advanced cook — enjoys complex recipes, varied cooking methods, bold flavors"
    };
    parts.push("Cooking skill: " + (skillMap[prefs.cookingSkill||"intermediate"]));

    if(prefs.proteins && prefs.proteins.length) parts.push("Preferred proteins: " + prefs.proteins.join(", "));
    if(prefs.carbs && prefs.carbs.length) parts.push("Preferred carbs: " + prefs.carbs.join(", "));
    if(prefs.fats && prefs.fats.length) parts.push("Preferred fats: " + prefs.fats.join(", "));
    if(prefs.restrictions && prefs.restrictions.length) parts.push("Dietary restrictions: " + prefs.restrictions.join(", "));
    if(prefs.custom && prefs.custom.trim()) parts.push("Additional notes: " + prefs.custom.trim());
    return parts.join(". ");
  }

  function buildMealPlanContext(){
    // Build rich context from user data — same approach as CoachTab
    const today = todayISO();
    const sortedW = (wlog||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
    const latestWeight = sortedW.length > 0 ? sortedW[sortedW.length-1].weight : null;
    const toGo = latestWeight && goals.targetWeight
      ? Math.abs(latestWeight - goals.targetWeight).toFixed(1) + " lbs " + (goals.goalType==="cut"?"to lose":"to gain")
      : "unknown";

    // Last 7 days of food logs to avoid repetition
    const recentFoods = [];
    for(let i=0;i<7;i++){
      const d = new Date(); d.setDate(d.getDate()-i);
      const k = isoDate(d);
      const dayE = (entries||{})[k]||[];
      dayE.forEach(function(e){ if(recentFoods.indexOf(e.name)===-1) recentFoods.push(e.name); });
    }

    return "USER CONTEXT FOR MEAL PLANNING:\n" +
      "Goal: " + (goals.goalType==="cut"?"Fat loss cut":goals.goalType==="bulk"?"Muscle building bulk":"Body recomposition") + "\n" +
      "Current weight: " + (latestWeight ? latestWeight + " lbs" : "unknown") + "\n" +
      "Target weight: " + (goals.targetWeight ? goals.targetWeight + " lbs (" + toGo + ")" : "not set") + "\n" +
      "Daily targets: " + goals.calories + " kcal | " + goals.protein + "g protein | " + goals.carbs + "g carbs | " + goals.fat + "g fat\n" +
      "Foods eaten recently (avoid repeating these too often): " + (recentFoods.length ? recentFoods.slice(0,20).join(", ") : "none logged yet") + "\n";
  }

  function toggleDay(d){ setOpenDays(function(p){return Object.assign({},p,{[d]:!p[d]});}); }
  function toggleCheck(k){ setChecked(function(p){return Object.assign({},p,{[k]:!p[k]});}); }

  async function generatePlan(){
    if(!workerUrl){setErr("Worker URL not set.");return;}
    if(getMpGenThisWeek()>=MP_WEEKLY_LIMIT){setErr("LIMIT_REACHED");return;}
    setLoading(true);setErr("");

    const goalLabel=goals.goalType==="cut"?"fat loss cutting phase":goals.goalType==="bulk"?"muscle building bulk":"body recomposition maintenance";

    try{
      const r=await fetch(workerUrl.replace(/\/$/,""),{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          type:"meal_plan",
          days:days,
          calories:goals.calories,
          protein:goals.protein,
          carbs:goals.carbs,
          fat:goals.fat,
          goalType:goalLabel,
          preferences:buildPrefsText(),
          context:buildMealPlanContext(),
        })
      });
      if(!r.ok)throw new Error("Worker returned "+r.status);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      if(!d.days||!Array.isArray(d.days))throw new Error("Invalid response format");
      setPlan(convertPlanUnits(d));
      setPlanDate(new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}));
      setOpenDays({0:true});
      setChecked({});
      incrementMpGen();
    }catch(e){
      setErr("Could not generate plan: "+e.message+". Please try again.");
    }
    setLoading(false);
  }

  const MEAL_EMOJIS={"Breakfast":"🌅","Lunch":"☀️","Dinner":"🌙","Snack":"🍎"};

  return(
    <div>
      {/* Generator card */}
      <div className="mp-hero">
        <div className="mp-title">Meal Planner</div>
        <div className="mp-sub">Get a personalized meal plan with exact weights, built around your macro targets. Perfect for Sunday batch cooking.</div>
        <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8,fontWeight:700}}>How many days?</div>
        <div className="day-selector">
          {[1,2,3,4,5,6,7].map(function(d){
            return(
              <button key={d} className={"day-btn"+(days===d?" active":"")}
                onClick={function(){setDays(d);}}>
                {d}
              </button>
            );
          })}
        </div>
        {/* Preferences toggle */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"1px",fontWeight:700}}>Food Preferences</div>
          <button onClick={function(){setShowPrefs(function(p){return !p;});}}
            style={{background:"none",border:"1px solid var(--b1)",borderRadius:8,color:"var(--txt2)",fontSize:12,padding:"4px 10px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            {showPrefs?"Hide":"Customize"}
          </button>
        </div>

        {showPrefs&&(
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid var(--b1)",borderRadius:14,padding:14,marginBottom:14}}>

            <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8,fontWeight:600}}>Proteins I eat</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {PROTEIN_OPTS.map(function(p){
                const active=(prefs.proteins||[]).includes(p);
                return <button key={p} onClick={function(){togglePref("proteins",p);}}
                  style={{padding:"5px 10px",borderRadius:20,border:"1px solid "+(active?"var(--ind)":"var(--b1)"),
                    background:active?"rgba(99,102,241,0.15)":"transparent",
                    color:active?"var(--indll)":"var(--mu)",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{p}</button>;
              })}
            </div>

            <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8,fontWeight:600}}>Carbs I prefer</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {CARB_OPTS.map(function(c){
                const active=(prefs.carbs||[]).includes(c);
                return <button key={c} onClick={function(){togglePref("carbs",c);}}
                  style={{padding:"5px 10px",borderRadius:20,border:"1px solid "+(active?"var(--cyan)":"var(--b1)"),
                    background:active?"rgba(6,182,212,0.12)":"transparent",
                    color:active?"var(--cyanl)":"var(--mu)",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{c}</button>;
              })}
            </div>

            <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8,fontWeight:600}}>Dietary restrictions</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {RESTRICTION_OPTS.map(function(r){
                const active=(prefs.restrictions||[]).includes(r);
                return <button key={r} onClick={function(){togglePref("restrictions",r);}}
                  style={{padding:"5px 10px",borderRadius:20,border:"1px solid "+(active?"var(--rose)":"var(--b1)"),
                    background:active?"rgba(244,63,94,0.12)":"transparent",
                    color:active?"var(--rosel)":"var(--mu)",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{r}</button>;
              })}
            </div>

            <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8,fontWeight:600}}>Cooking Skill Level</div>

                    <div style={{fontSize:13,fontWeight:600,color:active?"var(--indll)":"var(--txt2)",marginBottom:2}}>{opt[1]}</div>

            <textarea

            {buildPrefsText()&&(

                ✓ Preferences saved — your next plan will be customized
              </div>

          </div>
