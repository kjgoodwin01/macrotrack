<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MacroTrack</title>

<link rel="manifest" href="manifest.json" />

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui;
  background: #06070d;
  color: #e5e7eb;
}

.container {
  max-width: 430px;
  margin: auto;
  padding: 24px 18px;
}

h1 {
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #ffffff;
}

.card {
  background: linear-gradient(145deg, #0f111a, #141726);
  padding: 18px;
  margin-bottom: 16px;
  border-radius: 14px;
  border: 1px solid #1f2235;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.card h3 {
  margin: 0 0 12px 0;
  font-size: 15px;
  font-weight: 500;
  color: #9ca3af;
  letter-spacing: 0.5px;
}

.stat {
  font-size: 15px;
  margin-bottom: 6px;
}

input {
  width: 100%;
  margin-bottom: 10px;
  padding: 11px;
  border-radius: 8px;
  border: 1px solid #1f2235;
  background: #0b0d15;
  color: white;
}

input::placeholder {
  color: #6b7280;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: 500;
  margin-bottom: 8px;
  cursor: pointer;
  transition: 0.2s ease;
}

.primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
}

.primary:hover {
  opacity: 0.9;
}

.secondary {
  background: #1f2235;
  color: #c7d2fe;
}

.danger {
  background: #ef4444;
  color: white;
}

.meal-btn {
  background: #11131f;
  border: 1px solid #262a45;
}

.meal-btn:hover {
  background: #1a1d2e;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const { useState, useEffect } = React;

function App() {

  const [entries, setEntries] = useState(() => {
    return JSON.parse(localStorage.getItem("entries")) || [];
  });

  const [savedMeals, setSavedMeals] = useState(() => {
    return JSON.parse(localStorage.getItem("savedMeals")) || [];
  });

  const [form, setForm] = useState({
    name: "",
    calories: "",
    protein: "",
    carbs: "",
    fat: ""
  });

  useEffect(() => {
    localStorage.setItem("entries", JSON.stringify(entries));
  }, [entries]);

  useEffect(() => {
    localStorage.setItem("savedMeals", JSON.stringify(savedMeals));
  }, [savedMeals]);

  const addEntry = () => {
    if (!form.name || !form.calories) return;

    setEntries([...entries, {
      ...form,
      calories: Number(form.calories),
      protein: Number(form.protein),
      carbs: Number(form.carbs),
      fat: Number(form.fat)
    }]);

    setForm({
      name: "",
      calories: "",
      protein: "",
      carbs: "",
      fat: ""
    });
  };

  const totals = entries.reduce((acc, e) => {
    acc.calories += e.calories;
    acc.protein += e.protein;
    acc.carbs += e.carbs;
    acc.fat += e.fat;
    return acc;
  }, { calories: 0, protein: 0, carbs: 0, fat: 0 });

  return (
    React.createElement("div", { className: "container" },

      React.createElement("h1", null, "MacroTrack"),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "DAILY TOTALS"),
        React.createElement("div", { className: "stat" }, "Calories: " + totals.calories),
        React.createElement("div", { className: "stat" }, "Protein: " + totals.protein),
        React.createElement("div", { className: "stat" }, "Carbs: " + totals.carbs),
        React.createElement("div", { className: "stat" }, "Fat: " + totals.fat),

        React.createElement("button", {
          className: "danger",
          onClick: () => setEntries([])
        }, "Clear Day")
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "ADD FOOD"),

        ["name","calories","protein","carbs","fat"].map(field =>
          React.createElement("input", {
            key: field,
            placeholder: field,
            value: form[field],
            onChange: e => setForm({ ...form, [field]: e.target.value })
          })
        ),

        React.createElement("button", { className: "primary", onClick: addEntry }, "Add Entry"),

        React.createElement("button", {
          className: "secondary",
          onClick: () => {
            if (entries.length === 0) return;

            const mealName = prompt("Name this meal:");
            if (!mealName) return;

            setSavedMeals([...savedMeals, {
              name: mealName,
              items: entries
            }]);
          }
        }, "Save Current Meal")
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "DATA"),

        React.createElement("button", {
          className: "secondary",
          onClick: () => {
            const data = { entries, savedMeals };
            const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "macrotrack-backup.json";
            a.click();
          }
        }, "Export Data"),

        React.createElement("input", {
          type: "file",
          accept: "application/json",
          onChange: (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const data = JSON.parse(event.target.result);
              if (data.entries) setEntries(data.entries);
              if (data.savedMeals) setSavedMeals(data.savedMeals);
            };
            reader.readAsText(file);
          }
        })
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "SAVED MEALS"),

        savedMeals.map((meal, i) =>
          React.createElement("div", { key: i },

            React.createElement("button", {
              className: "meal-btn",
              onClick: () => {
                setEntries([...entries, ...meal.items]);
              }
            }, meal.name),

            React.createElement("button", {
              className: "danger",
              onClick: () => {
                setSavedMeals(savedMeals.filter((_, index) => index !== i));
              }
            }, "Delete")
          )
        )
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "ENTRIES"),

        entries.map((e, i) =>
          React.createElement("div", { className: "stat", key: i },
            e.name + " — " + e.calories + " cal"
          )
        )
      )

    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
