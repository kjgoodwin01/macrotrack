                </div>
                <div style={{fontSize:12,color:"var(--mu)",lineHeight:1.65,marginBottom:16}}>
                  Protein set at ~0.9g per lb bodyweight to protect muscle. You can adjust these anytime in Goals.
                </div>
                <button className="btn-ghost" style={{marginTop:0}} onClick={initEdit}>Adjust my targets</button>
              </div>
            ) : (
              <div>
                <div className="scard" style={{marginBottom:12}}>
                  <div className="stitle">Adjust Your Targets</div>
                  {[
                    {label:"Calories (kcal)", val:editCal, set:setEditCal},
                    {label:"Protein (g)", val:editProt, set:setEditProt},
                    {label:"Carbs (g)", val:editCarb, set:setEditCarb},
                    {label:"Fat (g)", val:editFat, set:setEditFat},
                  ].map(function(row){
                    return (
                      <div key={row.label} className="ob-edit-row">
                        <span className="ob-edit-lbl">{row.label}</span>
                        <input className="ob-edit-input" type="number" value={row.val} onChange={function(e){row.set(e.target.value);}}/>
                      </div>
                    );
                  })}
                </div>
                <button className="btn-ghost" style={{marginTop:0}} onClick={function(){setEditMode(false);}}>Use recommended</button>
              </div>
            )}
          </div>
        )}
      </div>

      <div className="ob-footer">
        <button className="ob-btn" disabled={!canNext} onClick={function(){
          if(step < TOTAL_STEPS-1){setStep(step+1);}
          else{finish();}
        }}>
          {step < TOTAL_STEPS-1 ? "CONTINUE" : "START TRACKING"}
        </button>
        {step > 0 && <button className="ob-back" onClick={function(){setStep(step-1);}}>← Back</button>}
      </div>
    </div>
  );
}

/* ── DataBackup ── */
function DataBackup({entries,wlog,goals,onImport}){
  const [importing,setImporting]=useState(false);
  const [importErr,setImportErr]=useState("");
  const fileRef=useRef(null);

  function exportData(){
    const data={
      version:1,
      exportedAt:new Date().toISOString(),
      goals:goals,
      entries:entries,
      wlog:wlog,
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="macrotrack-backup-"+isoDate(new Date())+".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleImportFile(e){
    const file=e.target.files[0];
    if(!file)return;
    setImportErr("");
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.version||(!data.entries&&!data.wlog)){
          setImportErr("Invalid backup file.");
          return;
        }
        if(window.confirm("This will replace your current data with the backup. Continue?")){
          onImport(data);
        }
      }catch(e){
        setImportErr("Could not read file. Make sure it is a MacroTrack backup.");
      }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  const entryDays=Object.keys(entries||{}).length;
  const wlogDays=(wlog||[]).length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontSize:12,color:"var(--mu)"}}>
          <div>{entryDays} day{entryDays!==1?"s":""} of food logs</div>
          <div>{wlogDays} weight entr{wlogDays!==1?"ies":"y"}</div>
        </div>
        <div style={{fontSize:11,color:"var(--mu)",textAlign:"right",fontFamily:"'JetBrains Mono',monospace"}}>
          Last export: {localStorage.getItem("mt_last_export")||"never"}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn" style={{marginTop:0,flex:1,fontSize:13,padding:"12px 8px"}} onClick={function(){
          exportData();
          localStorage.setItem("mt_last_export",isoDate(new Date()));
        }}>Export Backup</button>
        <button className="btn-ghost" style={{marginTop:0,flex:1,fontSize:13,padding:"12px 8px"}} onClick={function(){
          if(fileRef.current)fileRef.current.click();
        }}>Import Backup</button>
      </div>
      <input ref={fileRef} type="file" accept=".json,application/json" style={{display:"none"}} onChange={handleImportFile}/>
      {importErr&&<div className="err" style={{marginTop:8}}>{importErr}</div>}
      <div style={{fontSize:11,color:"var(--mu)",marginTop:10,lineHeight:1.6}}>
        Export saves a .json file to your device. Store it in iCloud, Google Drive, or email it to yourself. Import it anytime to restore your data.
      </div>
    </div>
  );
}

/* ── Adapt Engine ── */
function computeAdapt(wlog,goals){
  if(wlog.length<7)return null;
  const r=wlog.slice(-7);const ch=r[r.length-1].weight-r[0].weight;
  const tgt=-0.5,diff=ch-tgt;
  let adj=0,msg="",state="normal";
  if(Math.abs(diff)<0.15){msg="You're right on track — losing at your target pace. Keep doing exactly this.";state="ontrack";}
  else if(diff>0.15){adj=-75;msg="Lost "+Math.abs(ch).toFixed(1)+" lbs this week vs your 0.5 lb target. Dropping calories slightly.";}
  else{adj=75;msg="Lost "+Math.abs(ch).toFixed(1)+" lbs — faster than target. A small calorie bump protects muscle mass.";}
  return{ch:ch.toFixed(1),adj,newCal:goals.calories+adj,msg,state};
}


/* ── Coach Tab ── */
function CoachTab({goals,entries,wlog,workerUrl,aiUsageToday,onAiCall,aiLimit}){
  const [report,setReport]=useLocal("mt_coach_report",null);
  const [reportDate,setReportDate]=useLocal("mt_coach_date","");
  const [reportLoading,setReportLoading]=useState(false);
  const [msgs,setMsgs]=useLocal("mt_coach_msgs",[]);
  const [input,setInput]=useState("");
  const [aiTyping,setAiTyping]=useState(false);
  const msgsEndRef=useRef(null);

  function buildContext(){
    const today=todayISO();
    const last7=Array.from({length:7},function(_,i){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=isoDate(d);
      const dayE=entries[k]||[];
      const tot=dayE.reduce(function(a,e){return{cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f};},{cal:0,p:0,c:0,f:0});
      const foods=dayE.map(function(e){return e.name+" ("+e.cal+"kcal)";}).join(", ")||"nothing logged";
      if(dayE.length>0)return k+": "+tot.cal+" kcal | "+tot.p+"g protein | "+foods;
      return k+": not logged";
    }).reverse().join("\n");
    const sortedW=wlog.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
    const recentW=sortedW.slice(-14);
    const wChange=recentW.length>=2?(recentW[recentW.length-1].weight-recentW[0].weight).toFixed(1):null;
    const wLines=recentW.length>0?recentW.map(function(w){return w.date+": "+w.weight+" lbs";}).join("\n"):"No weight logged yet";
    const wTrend=wChange?"\nWeight trend: "+(parseFloat(wChange)<0?"Lost":"Gained")+" "+Math.abs(wChange)+" lbs over last "+recentW.length+" entries":"";
    const todayE=entries[today]||[];
    const todayTot=todayE.reduce(function(a,e){return{cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f};},{cal:0,p:0,c:0,f:0});
    const remCal=goals.calories-todayTot.cal;
    const remP=goals.protein-todayTot.p;
    const todayFoods=todayE.map(function(e){return e.name;}).join(", ")||"nothing yet";
    const goalTypeLabel=goals.goalType==="cut"?"Cutting (fat loss)":(goals.goalType==="bulk"?"Bulking (muscle gain)":"Maintaining");
    const targetWLine=goals.targetWeight?"Target weight: "+goals.targetWeight+" lbs":"Target weight: not set";
    const cur=recentW.length>0?recentW[recentW.length-1].weight:null;
    const toGo=cur&&goals.targetWeight?Math.abs(cur-goals.targetWeight).toFixed(1)+" lbs "+(goals.goalType==="cut"?"to lose":"to gain"):"unknown";
    return "USER DATA:\n\nGOAL TYPE: "+goalTypeLabel+"\n"+targetWLine+"\nProgress to goal: "+toGo+"\n\n"+
      "DAILY TARGETS: "+goals.calories+" kcal | Protein: "+goals.protein+"g | Carbs: "+goals.carbs+"g | Fat: "+goals.fat+"g\n\n"+
      "TODAY ("+today+"): "+todayTot.cal+"/"+goals.calories+" kcal, "+(remCal>0?remCal+" remaining":Math.abs(remCal)+" over")+
      " | protein "+todayTot.p+"g/"+(remP>0?remP+"g remaining":Math.abs(remP)+"g over")+"\n"+
      "Foods today: "+todayFoods+"\n\nLAST 7 DAYS:\n"+last7+"\n\nWEIGHT HISTORY:\n"+wLines+wTrend;
  }

  async function generateReport(force){
    const thisWeek=isoDate(new Date());
    if(!force&&report&&reportDate===thisWeek)return;
    if(!workerUrl)return;
    setReportLoading(true);
    try{
      const r=await fetch(workerUrl.replace(/\/$/,""),{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({type:"coach_report",context:buildContext(),
          prompt:"Write a concise weekly coaching check-in as 3-4 bullet points tailored to their specific goal (cut/bulk/maintain). Cover: 1) Weight trend and whether it aligns with their goal rate and target weight 2) Calorie adherence to their targets 3) Protein performance 4) One specific actionable adjustment for next week. Be direct, use their real numbers, start each bullet with a relevant emoji."
        })
      });
      if(!r.ok)throw new Error("Worker error");
      const d=await r.json();
      setReport(d.text||d.message||"");
      setReportDate(thisWeek);
    }catch(e){setReport("Could not generate report. Check your Worker URL in Goals.");}
    finally{setReportLoading(false);}
  }

  useEffect(function(){
    if(workerUrl){const w=isoDate(new Date());if(!report||reportDate!==w)generateReport(false);}
  },[workerUrl]);

  useEffect(function(){
    if(msgsEndRef.current)msgsEndRef.current.scrollIntoView({behavior:"smooth"});
  },[msgs,aiTyping]);

  async function sendMessage(text){
    if(!text.trim()||!workerUrl||aiTyping)return;
    if(aiUsageToday>=aiLimit){return;}
    onAiCall();
    const t=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const userMsg={role:"user",text:text.trim(),time:t};
    const newMsgs=msgs.concat([userMsg]);
    setMsgs(newMsgs);
    setInput("");
    setAiTyping(true);
    const history=newMsgs.map(function(m){return{role:m.role==="user"?"user":"assistant",content:m.text};});
    try{
      const r=await fetch(workerUrl.replace(/\/$/,""),{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({type:"coach_chat",context:buildContext(),messages:history})
      });
      if(!r.ok)throw new Error("Worker error");
      const d=await r.json();
      const aiText=d.text||d.message||"Sorry, could not process that.";
      const aiTime=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      setMsgs(function(prev){return prev.concat([{role:"ai",text:aiText,time:aiTime}]);});
    }catch(e){
      setMsgs(function(prev){return prev.concat([{role:"ai",text:"Connection error — check your Worker URL in Goals.",time:""}]);});
    }
    finally{setAiTyping(false);}
  }

  function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage(input);}}

  const QUICK=[
    "What should I eat for dinner?",
    "Am I losing weight fast enough?",
    "How much protein do I still need today?",
    "Best foods to hit my remaining macros?",
    "Should I eat back calories I burned?",
    "How does lifting affect my cut?",
  ];

  if(!workerUrl){
    return (
      <div>
        <div className="no-worker-coach">
          <div className="no-worker-icon">🧠</div>
          <div className="no-worker-title">AI Coach</div>
          <div className="no-worker-text">Set up your Cloudflare Worker URL in the Goals tab to unlock your personal AI coaching interface.</div>
        </div>
        <div className="scard">
          <div className="stitle">What Coach Can Do</div>
          <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.8}}>
            📊 Weekly check-in analyzing your actual weight trend and calorie data<br/>
            💬 Chat with full context — it knows your goals, logs, and history<br/>
            🍽️ Meal suggestions based on your remaining macros right now<br/>
            💪 Workout and nutrition advice tailored to your cut
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="coach-hero">
        <div className="coach-hero-head">
          <div>
            <div className="coach-hero-title">Weekly Check-in</div>
            <div className="coach-hero-sub">{reportDate?"Generated "+reportDate:"Generating..."}</div>
          </div>
          <button className="coach-regen" onClick={function(){generateReport(true);}} disabled={reportLoading}>
            {reportLoading?"...":"Refresh"}
          </button>
        </div>
        {reportLoading&&(
          <div className="report-loading">
            <div className="spin"/>
            <span>Analyzing your data...</span>
          </div>
        )}
        {!reportLoading&&report&&(
          <div className="report-body">
            {report.split("\n").filter(function(l){return l.trim();}).map(function(line,i){
              return (
                <div key={i} className="bullet">
                  <div className="bullet-dot"/>
                  <span>{line.replace(/^[•\-\*]\s*/,"")}</span>
                </div>
              );
            })}
          </div>
        )}
        {!reportLoading&&!report&&(
          <div className="report-no-data">
            <div className="report-no-data-icon">📊</div>
            <div style={{fontSize:13,color:"var(--mu)"}}>Log food and weight for a few days to get your first coaching report.</div>
          </div>
        )}
      </div>

      <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,marginBottom:8}}>Quick Questions</div>
      <div className="quick-btns">
        {QUICK.map(function(p){
          return <button key={p} className="quick-btn" onClick={function(){sendMessage(p);}}>{p}</button>;
        })}
      </div>

      {aiUsageToday>=aiLimit&&(
        <div className="rate-banner">
          <div className="rate-banner-icon">⚡</div>
          <div className="rate-banner-text">
            <strong>Daily limit reached ({aiLimit} messages)</strong><br/>
            Your AI chat resets at midnight. Use the weekly report above for coaching insights.
          </div>
        </div>
      )}
      <div className="chat-wrap">
        <div className="chat-msgs">
          {msgs.length===0&&(
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div style={{fontSize:28,marginBottom:8}}>👋</div>
              <div style={{fontSize:13,color:"var(--mu)",lineHeight:1.6}}>Ask me anything about your nutrition, progress, or training. I have full access to your data.</div>
            </div>
          )}
          {msgs.map(function(m,i){
            return (
              <div key={i} className={"msg "+(m.role==="user"?"user":"ai")}>
                <div className="msg-bubble">{m.text}</div>
                {m.time&&<div className="msg-time">{m.time}</div>}
              </div>
            );
          })}
          {aiTyping&&(
            <div className="msg ai">
              <div className="msg-bubble" style={{padding:"10px 16px"}}>
                <div className="typing-bubble">
                  <div className="typing-dot"/>
                  <div className="typing-dot"/>
                  <div className="typing-dot"/>
                </div>
              </div>
            </div>
          )}
          <div ref={msgsEndRef}/>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",padding:"4px 14px 0",background:"var(--s1)"}}>
        <span style={{fontSize:10,color:aiUsageToday>=aiLimit*0.8?"var(--rosel)":"var(--mu)",fontFamily:"'JetBrains Mono',monospace"}}>
          {aiUsageToday}/{aiLimit} today
        </span>
      </div>
      <div className="chat-input-row">
          <textarea className="chat-input" placeholder="Ask your coach..." value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={handleKey} rows={1}/>
          <button className="chat-send" onClick={function(){sendMessage(input);}} disabled={!input.trim()||aiTyping||aiUsageToday>=aiLimit}>Send</button>
        </div>
      </div>

      {msgs.length>0&&(
        <button className="btn-ghost" style={{fontSize:12,color:"var(--mu)"}} onClick={function(){if(window.confirm("Clear chat history?"))setMsgs([]);}}>
          Clear conversation
        </button>
      )}
    </div>
  );
}


/* ── App ── */
function App(){
  const [tab,setTab]=useLocal("mt_tab","log");
  const [goals,setGoalsRaw]=useLocal("mt_goals",DEFAULT_GOALS);
  const [entries,setEntriesRaw]=useLocal("mt_entries",{});
  const [wlog,setWlogRaw]=useLocal("mt_wlog",[]);
  const [usdaKey,setUsdaKeyRaw]=useLocal("mt_usda","");
  const [workerUrl,setWorkerUrlRaw]=useLocal("mt_worker","https://macrotrack-ai.kjgoodwin01.workers.dev");
  const [userName,setUserNameRaw]=useLocal("mt_name","");
  const [onboarded,setOnboardedRaw]=useLocal("mt_onboarded",false);
  const [aiUsage,setAiUsageRaw]=useLocal("mt_ai_usage",{});
  const [keyIn,setKeyIn]=useState("");
  const [modal,setModal]=useState(null);
  const [openMeals,setOpenMeals]=useState({Breakfast:true,Lunch:true,Dinner:true,Snacks:true});
  const [targetMeal,setTargetMeal]=useState("Breakfast");
  const [toastMsg,setToastMsg]=useState("");
  const toastKey=useRef(0);

  // Week navigation state
  const [weekOffset,setWeekOffset]=useState(0);
  const [selectedDate,setSelectedDate]=useState(todayISO());

  // When week changes, select the first day of that week (or today if current week)
  function handleOffsetChange(newOffset){
    setWeekOffset(newOffset);
    if(newOffset===0){setSelectedDate(todayISO());}
    else{const mon=getMondayOfWeek(new Date());mon.setDate(mon.getDate()+newOffset*7);setSelectedDate(isoDate(mon));}
  }

  function showToast(msg){
    toastKey.current++;setToastMsg(msg+"  ");
    setTimeout(()=>setToastMsg(msg),10);
  }

  // Wrapped setters that show a toast on save
  function setGoals(v){
    setGoalsRaw(v);
    syncToCloud(workerUrl,"sync_profile",{
      name:userName,goalType:v.goalType,targetWeight:v.targetWeight,
      calories:v.calories,protein:v.protein,carbs:v.carbs,fat:v.fat,
    });
    showToast("✓ Goals saved");
  }
  function setUsdaKey(v){setUsdaKeyRaw(v);if(v)showToast("✓ API key saved");}
  function setWorkerUrl(v){setWorkerUrlRaw(v);if(v)showToast("✓ Worker URL saved");}

  // Load from cloud when worker URL is available
  useEffect(function(){
    if(!workerUrl)return;
    loadFromCloud(workerUrl).then(function(cloud){
      if(!cloud)return;
      // Merge cloud entries into local (cloud wins for any date with data)
      if(cloud.entries&&cloud.entries.length>0){
        const byDate={};
        cloud.entries.forEach(function(e){
          const d=e.log_date;
          if(!byDate[d])byDate[d]=[];
          byDate[d].push({
            id:e.id,name:e.name,meal:e.meal,serving:e.serving,
            cal:e.cal,p:e.protein,c:e.carbs,f:e.fat
          });
        });
        setEntriesRaw(function(prev){
          return Object.assign({},prev,byDate);
        });
      }
      // Merge cloud weight log
      if(cloud.wlog&&cloud.wlog.length>0){
        setWlogRaw(function(prev){
          const map={};
          prev.forEach(function(w){map[w.date]=w;});
          cloud.wlog.forEach(function(w){map[w.log_date]={date:w.log_date,weight:parseFloat(w.weight)};});
          return Object.values(map).sort(function(a,b){return a.date.localeCompare(b.date);});
        });
      }
      // Merge profile if local has no name set
      if(cloud.profile&&!userName&&cloud.profile.name){
        setUserNameRaw(cloud.profile.name);
      }
    });
  },[workerUrl]);

  function completeOnboarding(data){
    setUserNameRaw(data.name);
    setGoalsRaw(data.goals);
    if(data.startWeight){
      const startEntry={date:todayISO(),weight:data.startWeight};
      setWlogRaw([startEntry]);
      syncToCloud(workerUrl,"sync_log_weight",{date:startEntry.date,weight:startEntry.weight});
    }
    setOnboardedRaw(true);
    // Sync profile to cloud
    syncToCloud(workerUrl,"sync_profile",{
      name:data.name,
      goalType:data.goals.goalType,
      targetWeight:data.goals.targetWeight,
      calories:data.goals.calories,
      protein:data.goals.protein,
      carbs:data.goals.carbs,
      fat:data.goals.fat,
    });
    showToast("Welcome to MacroTrack, "+data.name+"!");
  }

  // Rate limiting — 20 AI messages per day per user
  const AI_DAILY_LIMIT = 20;
  function getAiUsageToday(){
    const k=todayISO();
    return (aiUsage[k]||0);
  }
  function incrementAiUsage(){
    const k=todayISO();
    setAiUsageRaw(function(prev){
      const n=Object.assign({},prev);
      n[k]=(n[k]||0)+1;
      // Clean up old days (keep last 7)
      const keys=Object.keys(n).sort();
      if(keys.length>7)keys.slice(0,keys.length-7).forEach(function(old){delete n[old];});
      return n;
    });
  }

  function addEntry(e){
    setEntriesRaw(function(prev){
      const n=Object.assign({},prev);
      const entry=Object.assign({},e,{id:Date.now()});
      n[selectedDate]=(prev[selectedDate]||[]).concat([entry]);
      // Sync to cloud
      syncToCloud(workerUrl,"sync_add_entry",{entry:Object.assign({},entry,{date:selectedDate})});
      return n;
    });
    showToast("✓ Food logged");
  }
  function delEntry(id){
    syncToCloud(workerUrl,"sync_delete_entry",{entryId:id});
    setEntriesRaw(function(prev){
      const n=Object.assign({},prev);
      n[selectedDate]=(prev[selectedDate]||[]).filter(function(e){return e.id!==id;});
      return n;
    });
  }
  function logWeight(w){
    const entry={date:todayISO(),weight:w};
    syncToCloud(workerUrl,"sync_log_weight",{date:entry.date,weight:entry.weight});
    setWlogRaw(function(prev){
      const idx=prev.findIndex(function(x){return x.date===todayISO();});
      if(idx>=0){const n=prev.slice();n[idx]=entry;return n;}
      return prev.concat([entry]).slice(-90);
    });
    showToast("✓ Weight saved");
  }
  function clearDay(){
    setEntriesRaw(prev=>{const n={...prev};n[selectedDate]=[];return n;});
    showToast("✓ Day cleared");
  }

  const dayEntries=entries[selectedDate]||[];
  const logged=dayEntries.reduce((a,e)=>({calories:a.calories+e.cal,protein:a.protein+e.p,carbs:a.carbs+e.c,fat:a.fat+e.f}),{calories:0,protein:0,carbs:0,fat:0});
  const mEntries=m=>dayEntries.filter(e=>e.meal===m);
  const mCals=m=>mEntries(m).reduce((s,e)=>s+e.cal,0);

  const sorted=wlog.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const latW=sorted[sorted.length-1];const prevW=sorted[sorted.length-2];
  const wDelta=latW&&prevW?(latW.weight-prevW.weight).toFixed(1):null;
  const adapt=computeAdapt(sorted,goals);
  const isToday=selectedDate===todayISO();

  if(!onboarded){
    return React.createElement(Onboarding,{onComplete:completeOnboarding});
  }

  return(
    <div className="app">
      <Toast msg={toastMsg}/>

      {/* Header */}
      <div className="hdr">
        <div>
          <div className="logo"><em>MACRO</em>TRACK</div>
          {userName&&<div style={{fontSize:10,color:"var(--mu)",fontFamily:"'DM Sans',sans-serif",marginTop:1}}>Hey, {userName} 👋</div>}
        </div>
        <div className="hdr-r">
          <div className="hdr-date">{(()=>{const[y,m,d]=selectedDate.split("-").map(Number);return new Date(y,m-1,d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});})()}</div>
        </div>
      </div>

      {/* LOG TAB */}
      {tab==="log"&&<div className="page">
        <div style={{height:12}}/>
        <WeekSelector selectedDate={selectedDate} onSelect={setSelectedDate} weekOffset={weekOffset} onOffsetChange={handleOffsetChange} entries={entries}/>
        <CalHero logged={logged} goals={goals}/>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"16px 0 8px"}}>
          <div style={{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"1px",fontWeight:700}}>Meals</div>
          {dayEntries.length>0&&<button style={{background:"none",border:"none",fontSize:11,color:"var(--mu)",cursor:"pointer"}} onClick={()=>{if(window.confirm("Clear all food entries for this day?"))clearDay();}}>Clear day</button>}
        </div>

        {MEALS.map(meal=>{
          const items=mEntries(meal.id);const isOpen=openMeals[meal.id];
          return(
            <div className="meal-block" key={meal.id}>
              <div className={"meal-hd"+(isOpen?" open":"")} onClick={()=>setOpenMeals(p=>({...p,[meal.id]:!p[meal.id]}))}>
                <div className="meal-hd-l"><span className="meal-emoji">{meal.emoji}</span><span className="meal-hd-name">{meal.id}</span></div>
                <div className="meal-hd-r">
                  <span className="meal-kcal">{mCals(meal.id)} kcal</span>
                  {isToday&&<button className="meal-add" onClick={e=>{e.stopPropagation();setTargetMeal(meal.id);setModal("add");}}>+</button>}
                </div>
              </div>
              {isOpen&&<div className="meal-items">
                {items.length===0
                  ?<div className="meal-empty">{isToday?"Nothing logged yet — tap + to add":"Nothing logged"}</div>
                  :items.map(item=><div className="food-row" key={item.id}>
                    <div className="food-info"><div className="food-name">{item.name}</div><div className="food-srv">{item.serving}</div></div>
                    <div className="food-right"><div className="food-cal">{item.cal}</div><div className="food-mpw">{item.p}P·{item.c}C·{item.f}F</div></div>
                    {isToday&&<button className="food-del" onClick={()=>delEntry(item.id)}>×</button>}
                  </div>)}
              </div>}
            </div>
          );
        })}

        {isToday&&<button className="fab" onClick={()=>{setTargetMeal("Breakfast");setModal("add");}}>+ LOG FOOD</button>}
        {!isToday&&<div style={{textAlign:"center",fontSize:13,color:"var(--mu)",marginTop:20,paddingBottom:8}}>Viewing {fmtShort(new Date(selectedDate+"T12:00:00"))} — tap today to log food</div>}
      </div>}

      {/* WEIGHT TAB */}
      {tab==="weight"&&<div className="page">
        <div style={{height:12}}/>
        <div className="w-hero">
          <div className="w-lbl">Current Weight</div>
          <div className="w-big">{latW?<span>{latW.weight}<span> lbs</span></span>:<span style={{color:"var(--mu)",fontSize:22,fontFamily:"DM Sans"}}>Not logged yet</span>}</div>
          {wDelta&&<div className={"w-delta "+(parseFloat(wDelta)<=0?"dn":"up")}>{parseFloat(wDelta)<=0?"↓":"↑"} {Math.abs(wDelta)} lbs from last entry</div>}
          <WeightChart data={sorted}/>
          {sorted.length>1&&<div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--mu)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}><span>{sorted[0].date}</span><span>{sorted[sorted.length-1].date}</span></div>}
        </div>

        <div style={{background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:20,padding:18,marginBottom:14}}>
          <div className="w-lbl" style={{marginBottom:12}}>Log Today's Weight</div>
          <LogWeightInline onLog={logWeight}/>
        </div>

        {adapt?<div className={"adapt"+(adapt.state==="ontrack"?" ontrack":"")}>
          <div className="adapt-head"><span style={{fontSize:22}}>{adapt.state==="ontrack"?"✅":"🧠"}</span><span className="adapt-title">{adapt.state==="ontrack"?"On Track!":"Weekly Adjustment"}</span></div>
          <div className="adapt-body">{adapt.msg}</div>
          {adapt.adj!==0&&<div>
            <div className="adapt-stats">
              <div className="ast"><div className="ast-lbl">Current</div><div className="ast-val">{goals.calories}</div></div>
              <div className="ast"><div className="ast-lbl">Suggested</div><div className="ast-val">{adapt.newCal}</div></div>
              <div className="ast"><div className="ast-lbl">Change</div><div className="ast-val" style={{color:adapt.adj<0?"var(--rosel)":"var(--eml)"}}>{adapt.adj>0?"+":""}{adapt.adj}</div></div>
            </div>
            <button className="btn" style={{marginTop:14}} onClick={()=>{setGoals({...goals,calories:adapt.newCal});}}>Apply Adjustment</button>
          </div>}
        </div>:<div className="adapt">
          <div className="adapt-head"><span style={{fontSize:22}}>📊</span><span className="adapt-title">Adaptive Engine</span></div>
          <div className="adapt-body" style={{marginBottom:12}}>Log your weight for <strong style={{color:"var(--indll)"}}>{Math.max(0,7-sorted.length)} more day{7-sorted.length!==1?"s":""}</strong> to unlock personalized weekly calorie adjustments.</div>
          <div className="unlock-dots">{Array.from({length:7},(_,i)=><div key={i} className={"udot"+(i<sorted.length?" on":"")}/>)}</div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--mu)",marginTop:6}}><span>{sorted.length}/7 days</span><span>Need 7</span></div>
        </div>}

        <div style={{background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:20,padding:20,marginBottom:14}}>
          <div className="w-lbl" style={{marginBottom:10}}>History</div>
          {sorted.length===0?<div className="muted-t">No entries yet.</div>
          :sorted.slice().reverse().slice(0,14).map((e,i)=><div className="wlog-row" key={i}><span className="wlog-date">{e.date}</span><span className="wlog-val">{e.weight} lbs</span></div>)}
        </div>
      </div>}

      {/* COACH TAB */}
      {tab==="coach"&&<div className="page">
        <div style={{height:12}}/>
        <CoachTab goals={goals} entries={entries} wlog={wlog} workerUrl={workerUrl} selectedDate={selectedDate} aiUsageToday={getAiUsageToday()} onAiCall={incrementAiUsage} aiLimit={AI_DAILY_LIMIT}/>
      </div>}

      {/* GOALS TAB */}
      {tab==="goals"&&<div className="page">
        <div style={{height:12}}/>
        <div className="scard">
          <div className="stitle">My Goal</div>
          <div className="srow">
            <span className="slbl">Currently</span>
            <span className="sval" style={{color:goals.goalType==="cut"?"var(--rosel)":goals.goalType==="bulk"?"var(--eml)":"var(--cyanl)"}}>
              {goals.goalType==="cut"?"Cutting":goals.goalType==="bulk"?"Bulking":"Maintaining"}
            </span>
          </div>
          {goals.targetWeight&&<div className="srow">
            <span className="slbl">Target Weight</span>
            <span className="sval">{goals.targetWeight} lbs</span>
          </div>}
          {goals.targetWeight&&(()=>{
            const sorted=wlog.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
            const cur=sorted.length>0?sorted[sorted.length-1].weight:null;
            const diff=cur?Math.abs(cur-goals.targetWeight).toFixed(1):null;
            return diff?<div className="srow">
              <span className="slbl">To Go</span>
              <span className="sval" style={{color:"var(--indll)"}}>{diff} lbs</span>
            </div>:null;
          })()}
          <div style={{height:12}}/>
          <div className="stitle" style={{marginBottom:12}}>Daily Targets</div>
          <div className="srow"><span className="slbl">Calories</span><span className="sval">{goals.calories.toLocaleString()} kcal</span></div>
          <div className="srow"><span className="slbl">Protein</span><span className="sval" style={{color:"var(--rosel)"}}>{goals.protein}g</span></div>
          <div className="srow"><span className="slbl">Carbs</span><span className="sval" style={{color:"var(--cyanl)"}}>{goals.carbs}g</span></div>
          <div className="srow"><span className="slbl">Fat</span><span className="sval" style={{color:"var(--ambl)"}}>{goals.fat}g</span></div>
          <button className="btn" style={{marginTop:16}} onClick={()=>setModal("goals")}>Edit Goals</button>
        </div>

        <div className="scard">
          <div className="stitle">Today's Progress</div>
          {[{label:"Calories",val:logged.calories,goal:goals.calories,unit:"kcal",color:null},{label:"Protein",val:logged.protein,goal:goals.protein,unit:"g",color:"var(--rose)"},{label:"Carbs",val:logged.carbs,goal:goals.carbs,unit:"g",color:"var(--cyan)"},{label:"Fat",val:logged.fat,goal:goals.fat,unit:"g",color:"var(--amb)"}].map(it=>{
            const pct=Math.min((it.val/it.goal)*100,100),over=it.val>it.goal;
            return(<div className="prog-row" key={it.label}>
              <div className="prog-head"><span className="prog-lbl">{it.label}</span><span className="prog-val" style={{color:over?"var(--rose)":it.color||"var(--indll)"}}>{it.val}/{it.goal}{it.unit}</span></div>
              <div className="pbar-track" style={{marginBottom:0}}><div className={"pbar-fill"+(over?" over":"")} style={{width:pct+"%",background:over?"var(--rose)":it.color?"linear-gradient(90deg,"+it.color+"99,"+it.color+")":"linear-gradient(90deg,var(--ind),var(--vio))"}}/></div>
            </div>);
          })}
        </div>

        <div className="scard">
          <div className="stitle">Food Database</div>
          <div className="muted-t">MacroTrack uses the USDA FoodData Central database — 600,000+ foods including branded products. Search and barcode scanning work automatically once your Worker URL is set up. No API key needed.</div>
          {workerUrl&&<div className="ok-text" style={{marginTop:10}}>✓ Food database connected via your Worker</div>}
        </div>

        <div className="scard">
          <div className="stitle">AI Features</div>
          <div className="ok-text">✓ AI photo scanning, Coach, and food search are all active</div>
          <div className="muted-t" style={{marginTop:8}}>Powered by Claude AI. Photo scanning, coaching, and the full food database work automatically — no setup required.</div>
        </div>

        <div className="scard">
          <div className="stitle">Data Backup</div>
          <div className="muted-t" style={{marginBottom:14}}>
            Your data lives in this device's local storage. Export a backup regularly — especially before clearing your browser or switching phones. Import to restore from a backup.
          </div>
          <DataBackup entries={entries} wlog={wlog} goals={goals} onImport={function(data){
            if(data.entries)setEntriesRaw(data.entries);
            if(data.wlog)setWlogRaw(data.wlog);
            if(data.goals)setGoals(data.goals);
            showToast("✓ Data restored");
          }}/>
        </div>

        <div className="scard">
          <div className="stitle">About</div>
          <div className="muted-t">MacroTrack uses the Claude API for AI photo scanning and the USDA FoodData Central API for food search — both called directly from your device. Built as a free alternative to MacroFactor.</div>
        </div>
      </div>}

      {/* Nav */}
      <div className="nav">
        {[{id:"log",icon:"📋",label:"Log"},{id:"weight",icon:"⚖️",label:"Weight"},{id:"coach",icon:"🧠",label:"Coach"},{id:"goals",icon:"⚙️",label:"Goals"}].map(n=>(
          <button key={n.id} className={"nav-btn"+(tab===n.id?" active":"")} onClick={()=>{setTab(n.id);try{navigator.vibrate&&navigator.vibrate(8);}catch(e){}}}>
            <span className="nav-icon">{n.icon}</span>
            <span className="nav-lbl">{n.label}</span>
            <div className="nav-dot"/>
          </button>
        ))}
      </div>

      {modal==="add"&&<AddFoodModal onClose={()=>setModal(null)} onAdd={addEntry} targetMeal={targetMeal} usdaKey={usdaKey} workerUrl={workerUrl}/>}
      {modal==="weight"&&<WeightModal onClose={()=>setModal(null)} onLog={logWeight}/>}
      {modal==="goals"&&<GoalsModal goals={goals} onClose={()=>setModal(null)} onSave={setGoals}/>}
    </div>
  );
}

/* ── Inline weight logger ── */
function LogWeightInline({onLog}){
  const [v,setV]=useState("");
  return(
    <div style={{display:"flex",gap:8}}>
      <input className="field" type="number" step="0.1" placeholder="e.g. 215.4" value={v} onChange={e=>setV(e.target.value)} style={{flex:1}}/>
      <button className="btn-sm" disabled={!v} onClick={()=>{onLog(parseFloat(v));setV("");}}>Log</button>
    </div>
  );
}

// Keep localStorage alive — iOS Safari evicts PWA storage after 7 days of inactivity
// Writing any value on load resets the eviction timer
try{localStorage.setItem("mt_keepalive",Date.now());}catch(e){}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(e=>console.log("SW:",e));});}
</script>
</body>
</html>
