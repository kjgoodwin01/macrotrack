<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MacroTrack</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, system-ui;
  background:#02030a;
  color:#e5e7eb;
}

.container {
  max-width:430px;
  margin:auto;
  padding:20px 16px 90px;
}

/* CARDS */
.card {
  background:linear-gradient(180deg,#0b0e1a,#0f1324);
  padding:18px;
  border-radius:16px;
  margin-bottom:16px;
  border:1px solid #1c2033;
}

/* HEADINGS */
h1 { font-size:24px; margin-bottom:8px; }
h3 { font-size:13px; color:#8b93b3; margin-bottom:10px; }

/* CALORIES */
.calories {
  font-size:56px;
  font-weight:700;
  margin:8px 0;
}

/* MACROS */
.macros { display:flex; gap:8px; }
.macro {
  flex:1;
  padding:10px;
  border-radius:12px;
  text-align:center;
  font-size:12px;
  background:#12162a;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  border:1px solid #1c2033;
  background:#070912;
  color:white;
}

/* BUTTONS */
button {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:8px;
}

.primary {
  background:linear-gradient(135deg,#5b67ff,#7c3aed);
}

.secondary {
  background:#14182c;
}

.danger {
  background:#ef4444;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:430px;
  left:50%;
  transform:translateX(-50%);
  background:#0b0e1a;
  border-top:1px solid #1c2033;
  display:flex;
}

.nav button {
  flex:1;
  background:none;
  color:#6b7280;
  font-size:11px;
}

.nav .active {
  color:#7c3aed;
}

/* INSIGHT */
.insight {
  padding:12px;
  border-radius:12px;
  background:#12162a;
  margin-top:10px;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const { useState, useEffect } = React;

function App(){

const [tab,setTab]=useState("home");
const [entries,setEntries]=useState(()=>JSON.parse(localStorage.getItem("entries"))||[]);
const [weightLog,setWeightLog]=useState(()=>JSON.parse(localStorage.getItem("weightLog"))||[]);
const [savedMeals,setSavedMeals]=useState(()=>JSON.parse(localStorage.getItem("savedMeals"))||[]);

const [form,setForm]=useState({name:"",calories:"",protein:"",carbs:"",fat:""});
const [weightInput,setWeightInput]=useState("");

const [targetRate,setTargetRate]=useState(-0.5);
const [calorieTarget,setCalorieTarget]=useState(2500);

useEffect(()=>localStorage.setItem("entries",JSON.stringify(entries)),[entries]);
useEffect(()=>localStorage.setItem("weightLog",JSON.stringify(weightLog)),[weightLog]);
useEffect(()=>localStorage.setItem("savedMeals",JSON.stringify(savedMeals)),[savedMeals]);

const totals=entries.reduce((a,e)=>({
calories:a.calories+e.calories,
protein:a.protein+e.protein,
carbs:a.carbs+e.carbs,
fat:a.fat+e.fat
}),{calories:0,protein:0,carbs:0,fat:0});

const weeklyChange=(()=>{
if(weightLog.length<14)return 0;
const r=weightLog.slice(0,7).reduce((s,w)=>s+w.weight,0)/7;
const p=weightLog.slice(7,14).reduce((s,w)=>s+w.weight,0)/7;
return r-p;
})();

const adjustment=Math.round((weeklyChange-targetRate)*500);
const suggested=calorieTarget-adjustment;

const insight=(()=>{
if(weightLog.length<14)return "Log more data to generate insights";

if(Math.abs(adjustment)<50) return "You are perfectly on track. Keep current intake.";

if(adjustment>0) return "Fat loss slower than target. Reduce intake slightly.";

return "Losing faster than target. Increase intake slightly.";
})();

const Home=()=>(
<div className="container">
<div className="card">
<div>Calories</div>
<div className="calories">{totals.calories}</div>

<div className="macros">
<div className="macro">P {totals.protein}</div>
<div className="macro">C {totals.carbs}</div>
<div className="macro">F {totals.fat}</div>
</div>

<div style={{marginTop:10}}>Target: {calorieTarget}</div>
<div>Suggested: {suggested}</div>

<button className="danger" onClick={()=>setEntries([])}>Clear Day</button>
</div>
</div>
);

const Weight=()=>(
<div className="container">
<div className="card">
<h3>Weight Trend</h3>

<input placeholder="Enter weight" value={weightInput} onChange={e=>setWeightInput(e.target.value)}/>
<button className="primary" onClick={()=>{if(weightInput){setWeightLog([{weight:+weightInput},...weightLog]);setWeightInput("");}}}>Log Weight</button>

<div>Weekly Change: {weeklyChange.toFixed(2)} lbs</div>
</div>
</div>
);

const Food=()=>(
<div className="container">
<div className="card">
<h3>Add Food</h3>

{["name","calories","protein","carbs","fat"].map(f=>
<input key={f} placeholder={f} value={form[f]} onChange={e=>setForm({...form,[f]:e.target.value})}/>
)}

<button className="primary" onClick={()=>{if(form.name){setEntries([...entries,{...form,calories:+form.calories}]);}}}>Add Entry</button>
<button className="secondary" onClick={()=>{const n=prompt("Meal name");if(n)setSavedMeals([...savedMeals,{name:n,items:entries}]);}}>Save Meal</button>
</div>

<div className="card">
<h3>Saved Meals</h3>

{savedMeals.map((m,i)=>
<div key={i}>
<button className="secondary" onClick={()=>setEntries([...entries,...m.items])}>{m.name}</button>
<button className="danger" onClick={()=>setSavedMeals(savedMeals.filter((_,x)=>x!==i))}>Delete</button>
</div>
)}
</div>
</div>
);

const Coach=()=>(
<div className="container">
<div className="card">
<h3>Coaching</h3>

<input value={targetRate} onChange={e=>setTargetRate(+e.target.value||0)}/>
<input value={calorieTarget} onChange={e=>setCalorieTarget(+e.target.value||0)}/>

<div>Adjustment: {adjustment} kcal</div>
<div>Suggested: {suggested}</div>

<div className="insight">{insight}</div>
</div>
</div>
);

return(
<div>
{tab==="home"&&<Home/>}
{tab==="weight"&&<Weight/>}
{tab==="food"&&<Food/>}
{tab==="coach"&&<Coach/>}

<div className="nav">
{["home","weight","food","coach"].map(t=>
<button key={t} className={tab===t?"active":""} onClick={()=>setTab(t)}>{t.toUpperCase()}</button>
)}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
