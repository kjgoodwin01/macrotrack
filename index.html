<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MacroTrack</title>

<link rel="manifest" href="manifest.json" />

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body { margin: 0; font-family: Arial; background: #0a0a12; color: white; }
.container { max-width: 430px; margin: auto; padding: 20px; }
.card { background: #16162a; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
input { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: none; }
button { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 8px; }
.small-btn { background: #f43f5e; }
</style>
</head>

<body>
<div id="root"></div>

<script>
const { useState, useEffect } = React;

function App() {

  const [entries, setEntries] = useState(() => {
    return JSON.parse(localStorage.getItem("entries")) || [];
  });

  const [savedMeals, setSavedMeals] = useState(() => {
    return JSON.parse(localStorage.getItem("savedMeals")) || [];
  });

  const [form, setForm] = useState({
    name: "",
    calories: "",
    protein: "",
    carbs: "",
    fat: ""
  });

  useEffect(() => {
    localStorage.setItem("entries", JSON.stringify(entries));
  }, [entries]);

  useEffect(() => {
    localStorage.setItem("savedMeals", JSON.stringify(savedMeals));
  }, [savedMeals]);

  const addEntry = () => {
    if (!form.name || !form.calories) return;

    setEntries([...entries, {
      ...form,
      calories: Number(form.calories),
      protein: Number(form.protein),
      carbs: Number(form.carbs),
      fat: Number(form.fat)
    }]);

    setForm({
      name: "",
      calories: "",
      protein: "",
      carbs: "",
      fat: ""
    });
  };

  const totals = entries.reduce((acc, e) => {
    acc.calories += e.calories;
    acc.protein += e.protein;
    acc.carbs += e.carbs;
    acc.fat += e.fat;
    return acc;
  }, { calories: 0, protein: 0, carbs: 0, fat: 0 });

  return (
    React.createElement("div", { className: "container" },

      React.createElement("h2", null, "MacroTrack"),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "Totals"),
        React.createElement("p", null, "Calories: " + totals.calories),
        React.createElement("p", null, "Protein: " + totals.protein),
        React.createElement("p", null, "Carbs: " + totals.carbs),
        React.createElement("p", null, "Fat: " + totals.fat),

        React.createElement("button", {
          className: "small-btn",
          onClick: () => setEntries([])
        }, "Clear Day")
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "Add Food"),

        ["name","calories","protein","carbs","fat"].map(field =>
          React.createElement("input", {
            key: field,
            placeholder: field,
            value: form[field],
            onChange: e => setForm({ ...form, [field]: e.target.value })
          })
        ),

        React.createElement("button", { onClick: addEntry }, "Add Entry"),

        React.createElement("button", {
          onClick: () => {
            if (entries.length === 0) return;

            const mealName = prompt("Name this meal:");
            if (!mealName) return;

            setSavedMeals([...savedMeals, {
              name: mealName,
              items: entries
            }]);
          }
        }, "Save Current Meal")
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "Data"),

        React.createElement("button", {
          onClick: () => {
            const data = { entries, savedMeals };
            const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "macrotrack-backup.json";
            a.click();
          }
        }, "Export Data"),

        React.createElement("input", {
          type: "file",
          accept: "application/json",
          onChange: (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const data = JSON.parse(event.target.result);
              if (data.entries) setEntries(data.entries);
              if (data.savedMeals) setSavedMeals(data.savedMeals);
            };
            reader.readAsText(file);
          }
        })
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "Saved Meals"),

        savedMeals.map((meal, i) =>
          React.createElement("div", { key: i },

            React.createElement("button", {
              onClick: () => {
                setEntries([...entries, ...meal.items]);
              }
            }, meal.name),

            React.createElement("button", {
              className: "small-btn",
              onClick: () => {
                setSavedMeals(savedMeals.filter((_, index) => index !== i));
              }
            }, "Delete")
          )
        )
      ),

      React.createElement("div", { className: "card" },
        React.createElement("h3", null, "Entries"),

        entries.map((e, i) =>
          React.createElement("p", { key: i },
            e.name + " - " + e.calories + " cal"
          )
        )
      )

    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
