<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MacroTrack</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, system-ui;
  background: radial-gradient(circle at top, #0b0f2a, #02030a);
  color:#f3f4f6;
}

.container {
  max-width:430px;
  margin:auto;
  padding:20px 16px 90px;
}

/* CARD SYSTEM */
.card {
  background: rgba(20, 24, 50, 0.65);
  backdrop-filter: blur(14px);
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* TYPOGRAPHY */
.title { font-size:13px; color:#9ca3af; }
.big-number { font-size:64px; font-weight:700; letter-spacing:-1px; }

/* MACROS */
.macros { display:flex; gap:10px; margin-top:12px; }
.macro {
  flex:1;
  padding:12px;
  border-radius:14px;
  background: rgba(255,255,255,0.04);
  text-align:center;
  font-size:13px;
}

/* INPUT */
input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background: rgba(255,255,255,0.05);
  color:white;
  margin-bottom:10px;
}

/* BUTTONS */
button {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:500;
  margin-bottom:10px;
}

.primary {
  background: linear-gradient(135deg,#6366f1,#a855f7);
}

.secondary {
  background: rgba(255,255,255,0.06);
}

.danger {
  background:#ef4444;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:430px;
  left:50%;
  transform:translateX(-50%);
  background: rgba(10,12,30,0.9);
  backdrop-filter: blur(20px);
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex;
}

.nav button {
  flex:1;
  background:none;
  color:#6b7280;
  font-size:11px;
}

.nav .active {
  color:#a855f7;
}

/* COACH */
.insight {
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  background: rgba(99,102,241,0.12);
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const { useState, useEffect } = React;

function App(){

const [tab,setTab]=useState("home");
const [entries,setEntries]=useState(()=>JSON.parse(localStorage.getItem("entries"))||[]);
const [weightLog,setWeightLog]=useState(()=>JSON.parse(localStorage.getItem("weightLog"))||[]);

const [form,setForm]=useState({name:"",calories:"",protein:"",carbs:"",fat:""});
const [weightInput,setWeightInput]=useState("");

const [targetRate,setTargetRate]=useState(-0.5);
const [calorieTarget,setCalorieTarget]=useState(2500);

useEffect(()=>localStorage.setItem("entries",JSON.stringify(entries)),[entries]);
useEffect(()=>localStorage.setItem("weightLog",JSON.stringify(weightLog)),[weightLog]);

const totals=entries.reduce((a,e)=>({
calories:a.calories+e.calories,
protein:a.protein+e.protein,
carbs:a.carbs+e.carbs,
fat:a.fat+e.fat
}),{calories:0,protein:0,carbs:0,fat:0});

const weeklyChange=(()=>{
if(weightLog.length<14)return 0;
const r=weightLog.slice(0,7).reduce((s,w)=>s+w.weight,0)/7;
const p=weightLog.slice(7,14).reduce((s,w)=>s+w.weight,0)/7;
return r-p;
})();

const adjustment=Math.round((weeklyChange-targetRate)*500);
const suggested=calorieTarget-adjustment;

const insight=(()=>{
if(weightLog.length<14)return "Log more data to unlock coaching insights.";
if(Math.abs(adjustment)<50) return "You're dialed in. Stay consistent.";
if(adjustment>0) return "Fat loss slower than target. Slight calorie reduction recommended.";
return "Losing faster than target. Increase calories slightly.";
})();

const Home=()=>React.createElement("div",{className:"container"},
React.createElement("div",{className:"card"},
React.createElement("div",{className:"title"},"Calories"),
React.createElement("div",{className:"big-number"},totals.calories),

React.createElement("div",{className:"macros"},
React.createElement("div",{className:"macro"},"Protein "+totals.protein),
React.createElement("div",{className:"macro"},"Carbs "+totals.carbs),
React.createElement("div",{className:"macro"},"Fat "+totals.fat)
),

React.createElement("div",{style:{marginTop:"12px"}},"Target: "+calorieTarget),
React.createElement("div",null,"Suggested: "+suggested),

React.createElement("button",{className:"danger",onClick:()=>setEntries([])},"Clear Day")
)
);

const Weight=()=>React.createElement("div",{className:"container"},
React.createElement("div",{className:"card"},
React.createElement("div",{className:"title"},"Weight Trend"),

React.createElement("input",{placeholder:"Enter weight",value:weightInput,onChange:e=>setWeightInput(e.target.value)}),
React.createElement("button",{className:"primary",onClick:()=>{if(weightInput){setWeightLog([{weight:+weightInput},...weightLog]);setWeightInput("");}}},"Log Weight"),

React.createElement("div",null,"Weekly Change: "+weeklyChange.toFixed(2)+" lbs")
)
);

const Food=()=>React.createElement("div",{className:"container"},
React.createElement("div",{className:"card"},
React.createElement("div",{className:"title"},"Add Food"),

["name","calories","protein","carbs","fat"].map(f=>
React.createElement("input",{key:f,placeholder:f,value:form[f],onChange:e=>setForm({...form,[f]:e.target.value})})
),

React.createElement("button",{className:"primary",onClick:()=>{if(form.name){setEntries([...entries,{...form,calories:+form.calories}]);}}},"Add Entry")
)
);

const Coach=()=>React.createElement("div",{className:"container"},
React.createElement("div",{className:"card"},
React.createElement("div",{className:"title"},"Coach"),

React.createElement("input",{value:targetRate,onChange:e=>setTargetRate(+e.target.value||0)}),
React.createElement("input",{value:calorieTarget,onChange:e=>setCalorieTarget(+e.target.value||0)}),

React.createElement("div",{style:{marginTop:"10px"}},"Adjustment: "+adjustment+" kcal"),
React.createElement("div",null,"Suggested: "+suggested),

React.createElement("div",{className:"insight"},insight)
)
);

return React.createElement("div",null,
tab==="home"&&React.createElement(Home),
tab==="weight"&&React.createElement(Weight),
tab==="food"&&React.createElement(Food),
tab==="coach"&&React.createElement(Coach),

React.createElement("div",{className:"nav"},
["home","weight","food","coach"].map(t=>
React.createElement("button",{key:t,className:tab===t?"active":"",onClick:()=>setTab(t)},t.toUpperCase())
)
)
);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
